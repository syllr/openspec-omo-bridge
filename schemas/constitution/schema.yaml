name: constitution
version: 1
description: Simplified 3-stage schema for project constitution - scan → design → apply

# ============================================================
# 共享约定：与 spec-driven schema 的引用关系（Oracle review ⚪ #6）
# ============================================================
# 本 schema 的 Constitution 区域格式详见 spec-driven schema 的 AGENTS.md 约定。
# 两个 schema 共用 AGENTS.md 作为宪法元数据的存储位置，
# constitution 用 <!-- constitution-start/end --> 标记隔离，spec-driven 用 ## Constitution 区域。
# ============================================================
artifacts:
  - id: scan
    generates: scan.md
    description: Ask user to select constitution dimension(s) and gather requirements
    template: scan.md
    tracks: scan.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 scan.md。**

      === Step 1：询问用户要添加哪个维度 ===

      使用 question 工具询问用户要添加哪个维度的宪法：

      ```
      可选维度列表：
      1. code-conventions   — 代码风格/命名/注释/import/函数规范
      2. architecture        — 分层/模块/依赖方向
      3. domain             — 核心实体/业务模型/值对象/聚合根
      4. integration        — 外部API/数据库/消息队列等外部依赖
      5. api                — 我对外提供的接口规范
      6. security           — 认证/授权/加密/输入验证
      7. testing            — 测试策略/覆盖率/Mock规范
      8. observability       — 日志/监控/告警/错误处理
      9. release            — Git/Commit规范/CI-CD/发布流程
      10. documentation     — README/ADR/变更日志

      请告诉我要添加哪个维度的宪法（可以说序号或名称）。
      ```

      === Step 2：粗检 — 维度是否存在 ===

      运行以下命令检查该维度是否已存在：

      ```bash
      # 检查 docs/constitution/<dimension>/ 目录
      ls docs/constitution/<dimension>/ 2>/dev/null || echo "DIR: NOT_EXISTS"

      # 读取 AGENTS.md 中 Constitution 区域
      test -f AGENTS.md && awk '/constitution-start/,/constitution-end/' AGENTS.md 2>/dev/null || echo "AGENTS: NOT_EXISTS"
      ```

      **比对两个来源的一致性**：
      - 如果目录存在（DIR）且 AGENTS.md 也有该维度（AGENTS）→ ✅ 一致，维度已存在
      - 如果目录存在但 AGENTS.md 没有对应条目 → ⚠️ 不一致（可能是之前 apply 中断导致），告知用户，**以 AGENTS.md 为准**
      - 如果 AGENTS.md 有条目但目录不存在 → ⚠️ 不一致，同样以 AGENTS.md 为准
      - 两者都没有 → ✅ 干净，新维度

      记录粗检结果（维度是否存在）。

      === Step 3：确认用户需求 ===

      通过对话了解用户的具体需求，获取**技术栈信息**：

      ```text
      - 如果是 code-conventions：需要支持哪些语言？有什么特殊要求？
      - 如果是 integration：需要集成哪些外部系统？
      - 如果是 api：主要对外暴露哪些接口？
      - 如果是其他维度：用户想约束什么？
      ```

      记录用户确认的内容和不确定的点（标记 [NEEDS RESEARCH]）。

      获取到 tech_stack 后，执行**精检 — 精确去重判断**：

      1. 查看 AGENTS.md 中 `**<dimension>**` 下是否有 `` `<tech_stack>` `` 的条目
      2. 如果有 → **完全重复**（同一维度 + 同一 tech_stack），询问用户是要 UPDATE（覆盖）还是 SKIP
      3. 如果没有但维度已存在 → **追加模式**（同一维度 + 新 tech_stack），确认后继续
      4. 如果维度不存在 → **新增维度**，确认后继续

      === Step 4：生成 scan.md ===

      打包上下文，委托 category="write" 生成 scan.md：

      **Fast fail**：如果以下 task(category="write") 调用失败（超时、不可用、出错），立即停止工作流，向用户报告：「🔴 scan.md 生成失败。[错误信息]」，等待用户介入。

      task(category="write", load_skills=[],
          prompt="生成 scan.md 文件。

          输入文件（请直接读取）：
          - scan.md 模板：schemas/constitution/templates/scan.md

          直接传入的上下文：
          - 用户选择的维度：[填入用户选择的维度名称]
          - 适用技术栈：[填入用户确认的技术栈，或"通用"]
          - 用户需求摘要：[填入用户描述的具体需求]
          - 操作类型：[INIT 新增维度 / APPEND 追加 tech_stack / UPDATE 覆盖已有条目]（来自精检去重结果）
          - 已有维度列表：[从 AGENTS.md 中读取的已有维度列表]
          - 精确去重结果：[完全重复/可以追加/新增维度]

          按模板结构输出。只聚焦用户选择的维度。")
    requires: [ ]
  - id: design
    generates: design.md
    description: Research best practices for the selected dimension and design reference structure
    template: design.md
    tracks: design.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 design.md。**

      === Step 1：读取 scan.md ===

      读取 `openspec/changes/<change-name>/scan.md`，确认：
      - 聚焦哪个维度
      - 适用技术栈
      - 用户需求摘要

      === Step 2：调研最佳实践 ===

      根据用户选择的维度，启动 librarian agent 调研该维度的业界最佳实践：

      task(subagent_type="librarian",
           prompt="调研项目章程中【{dimension}】维度的业界最佳实践。

           已确认的信息：
           - 维度：{dimension}
           - 适用技术栈：{tech_stack}
           - 用户需求：{user_requirements}

           请调研：
           1. 该维度的核心内容是什么？
           2. 业界有哪些标准和最佳实践？（Google Style Guide、Uber Go Guide、OWASP 等）
           3. 每个技术栈有什么特有的规范？
           4. 常见的坑是什么？

           输出：
           - 该维度的核心规则列表
           - 参考资料（URL + 关键摘要）
           - 技术栈特有规则（按技术栈分类）

           将结果保存到 openspec/changes/<change-name>/research/<dimension>/")

       **Fast fail**：如果以上 librarian 调用失败，立即停止工作流，向用户报告：「🔴 最佳实践调研失败。[错误信息]」，等待用户介入。不得跳过调研直接生成 design.md。

      === Step 3：展示调研结果 ===

      向用户展示调研结果，确认或修改。

       === Step 4：生成 design.md ===

       **Fast fail**：如果以下 task(category="write") 调用失败，立即停止工作流，向用户报告：「🔴 design.md 生成失败。[错误信息]」，等待用户介入。

       task(category="write", load_skills=[],
           prompt="生成 design.md 文件。

          输入文件（请直接读取）：
          - 模板：schemas/constitution/templates/design.md
          - Scan：openspec/changes/<change-name>/scan.md
          - Research：openspec/changes/<change-name>/research/<dimension>/（如果存在）

          直接传入的上下文：
          - 聚焦维度：[填入本次聚焦的维度]
          - 用户确认内容：[填入用户批准的规则]

          design.md 需要包含以下信息：
          1. 该维度的最终规则列表（按 tech_stack 分组）
          2. 写入 docs/constitution/<dimension>/<file>.md 的规范内容

          按模板结构输出。")
    requires:
      - scan
  # tasks 和 critic 阶段已删除：对于 constitution 场景，
  # 产出只是几个文档文件，不需要复杂的执行计划和多 agent 评审。
  # apply 直接基于 design 输出创建文件。
apply:
  requires:
    - design
  tracks: design.md
  instruction: |
    __LANG_PLACEHOLDER__

    **重要：tasks 和 critic 阶段已删除。apply 直接基于 design 输出创建文件。**

      === Step 1：读取上下文 ===

      读取 `openspec/changes/<change-name>/scan.md` 和 `openspec/changes/<change-name>/design.md`，确认：
      - 聚焦哪个维度
      - 操作类型（来自 scan.md）：INIT 新增维度 / APPEND 追加 tech_stack / UPDATE 覆盖已有条目
      - 该维度的规则列表（按 tech_stack 分组）
      - 每个文件的规范内容
      - 该维度的目录是否已存在

      === Step 2：检测全局运行模式 ===

      ```bash
      # 检查 docs/constitution/ 是否存在
      ls docs/constitution/ 2>/dev/null && echo "docs/constitution/ exists" || echo "docs/constitution/ does not exist"

      # 检查根目录 AGENTS.md 是否有 Constitution 内容
      test -f AGENTS.md && grep -q 'constitution-start' AGENTS.md && echo "AGENTS.md has constitution content" || echo "AGENTS.md has no constitution content"
      ```

      - 两者都有 → **APPEND 模式**（已有宪法，本次是追加或更新）
      - 两者都无 → **INIT 模式**（第一次运行，从头创建）
      - 只有其中之一存在 → **不完整模式**：警告用户"宪法数据不完整（路径 A 有但路径 B 无）"，让用户选择：1) 覆盖重建  2) 以 AGENTS.md 为准补全  3) 中止

      === Step 3：按操作类型执行 ===

      `操作类型` 来自 scan.md 中 Step 3 的精检去重结果，分为三种：

      ---

      **场景 A：INIT — 新增维度（维度不存在，首次添加）**

      ```bash
      mkdir -p docs/constitution/<dimension>/
      ```

      对 design 中确认的每个条目（通用规则 / tech_stack 特有规则），创建对应的 .md 文件，写入规范内容。

      委托 category="write" 在 AGENTS.md 中创建 `## Constitution` 区域（含 constitution-start/end 标记），插入新维度条目。

      ---

      **场景 B：APPEND — 追加 tech_stack（维度已存在，在已有维度下加新条目）**

      ```bash
      # 目录已存在，无需创建
      ```

      只创建新增的 .md 文件（如 python.md），不覆盖已有的 universal.md。

      委托 category="write" 更新 AGENTS.md：
      - 找到 `**<dimension>**` 所在行
      - 在该维度块下追加新 tech_stack 条目
      - 不要创建重复的维度标题

      ---

      **场景 C：UPDATE — 覆盖已有条目（维度 + tech_stack 都已存在）**

      ```bash
      # 目录已存在，覆盖对应的 .md 文件
      ```

      覆盖对应的 .md 文件（用 design 产出的新内容替换）。其他文件不动。

      委托 category="write" 更新 AGENTS.md：
      - 找到 `**<dimension>**` 下对应的 `` `<tech_stack>` `` 行
      - 替换为一行的描述
      - 保留该维度下其他条目不动

      ---

      **统一的 write agent prompt（请根据上述场景选择对应的操作部分）：**

      **Fast fail**：如果以下 task(category="write") 调用失败，立即停止工作流，向用户报告：「🔴 AGENTS.md 更新失败。[错误信息]」，等待用户介入。不得手动修改 AGENTS.md。

      task(category="write", load_skills=[],
          prompt="更新 AGENTS.md 的 Constitution 区域。

          操作类型：{INIT / APPEND / UPDATE}
          目标维度：<dimension>
          目标 tech_stack：<tech_stack>
          新增/更新的条目描述：<条目描述>

          AGENTS.md 中 Constitution 区域格式：
          ```markdown
          ## Constitution
          <!-- constitution-start -->
          - **code-conventions** — 代码风格/命名/注释规范
            - `通用` 格式化/命名/注释规范
            - `python` PEP 8, type hints
          - **architecture** — 分层/模块/依赖方向
            - `通用` 分层架构约束
          <!-- constitution-end -->
          ```

          根据操作类型执行：
          - INIT：在 AGENTS.md 末尾创建 ## Constitution 区域（含标记），写入新维度条目
          - APPEND：找到 `**<dimension>**` 块，在其条目列表末尾追加 `- <tech_stack> <描述>`
          - UPDATE：找到 `**<dimension>**` 下对应的 `` `<tech_stack>` `` 行，替换描述部分
          不要修改 Constitution 区域之外的任何内容。不要修改子目录的 AGENTS.md。")

      === Step 4：自检 ===

      ```bash
      # 1. 文件已创建
      ls docs/constitution/<dimension>/

      # 2. AGENTS.md 结构完整
      grep -q 'constitution-start' AGENTS.md && echo "start tag exists"
      grep -q 'constitution-end' AGENTS.md && echo "end tag exists"
      grep -q '<dimension>' AGENTS.md && echo "dimension entry exists"

      # 3. 如为 APPEND 或 UPDATE，验证没有重复的维度标题
      test "$(grep -c '\*\*<dimension>\*\*' AGENTS.md)" -le 1 && echo "no duplicate dimension title"
      ```

      如果任何检查失败，警告用户并提供修复选项。建议先备份 AGENTS.md（cp AGENTS.md AGENTS.md.bak）。

      === Step 5：报告结果 ===

      向用户展示：
      - 操作类型（INIT / APPEND / UPDATE）
      - 创建或修改了哪些文件
      - AGENTS.md 更新内容
      - 验证结果

      如果失败，提供修复命令。
