name: constitution
version: 1
description: Independent schema for project constitution initialization and updates - scan → design → tasks → critic → apply
artifacts:
  - id: scan
    generates: scan.md
    description: Tech stack analysis and multi-agent parallel research
    template: scan.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 scan.md。**


      通过结构化的 3 阶段流程分析项目的技术栈：


      **Phase 1：项目检测与配置解析**

      - Read configuration files: package.json, go.mod, pyproject.toml, Cargo.toml, etc.
      - Use Glob and Grep to analyze project structure, build tools, test frameworks
      - Distinguish between existing project (has code) and empty project

      **Phase 2：用户对话（/openspec-explore）**

      - Present current tech stack analysis results
      - Discuss whether to introduce new technologies or upgrade dependencies
      - Identify any technology decisions that may need verification

      **Phase 3: Summary**

      - Document decisions and alternatives
      - Output structured scan.md with decision log


      **Existing project path**: 3-phase process starting with config analysis.

      **Empty project path**: Start from Phase 2 (ask user about requirements, recommend tech stack),
      then proceed directly to Summary, skip Phase 1.

      === PHASE 3：通过 Deep Agent 生成 ===

      After completing Phases 1-2, package all findings into a prompt and
      delegate scan.md generation to a focused agent:

      task(category="deep", load_skills=[], run_in_background=false,
           prompt="Generate the scan.md file for a project constitution initialization.

           Tech stack analysis findings:
           [将 Phase 1 的项目检测结果（配置文件、构建工具、测试框架等）填入此处]

           User decisions and preferences:
           [将 Phase 2 的用户技术栈讨论和确认结果填入此处]

           Project type: [现有项目 / 空项目]

           The scan.md MUST:
           - Include the structured tech stack analysis report with decision log
           - Document all decisions and alternatives discussed with the user
           - Note any uncertainty signals for further research in the design phase
           - Be clear about which decisions are confirmed vs. need research
           - Be output-ready at openspec/changes/<change-name>/scan.md")
    requires: []
  - id: design
    generates: constitution-design.md
    description: Constitution design document with best practices and reference structure
    template: constitution-design.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 constitution-design.md。**


      Based on the confirmed tech stack from scan.md, design the constitution structure.


      **Step 1：多 Agent 最佳实践调研**

      - Launch multiple librarian agents in parallel, each focused on one technology from the scan results
      - Research official documentation, community standards, and common pitfalls
      - Each agent produces a technology-specific best practice report
      - After all librarians complete, generate a summary file `research-scope.md` listing all
        researched topics and their key findings. This file is later used by Technical Research
        to determine which topics already have coverage.

      **Step 2：用户审核**

      - Present each technology's research results to the user for confirmation
      - User can approve, request changes, or reject specific recommendations

      **Step 3：生成参考文档**

      - Call /summarize-research to produce structured reference files:
        - coding-standards/naming.md
        - coding-standards/imports.md
        - testing/unit-testing.md
        - architecture.md
        - gotchas.md
      - Files are organized by domain following the constitution directory structure


      === Technical Research (Optional) ===

      When reading scan.md, watch out for **uncertainty signals** such as:

      - Words like "可能", "maybe", "might", "needs investigation"
      - Unclear library behavior or compatibility concerns
      - Technology decisions that need verification before finalizing
      - References to undocumented APIs or protocols

      对于每个不确定点，按以下流程处理：

      1. **Identify research topics**: Extract each uncertain point from scan.md
         into a named research topic (kebab-case).

      2. **Research and validate**: For each topic, determine if Step 1's librarian
         research already covers it. If yes → directly run deep validation.
         If no → fire a librarian first, then deep validation.

         All research artifacts are saved to `$project/spectest/<topic>/`.
         After user confirmation, move to `openspec/changes/<change-name>/research/<topic>/`.

         ```
         # If topic already researched in Step 1:
         task(category="deep", load_skills=[], run_in_background=false, prompt="基于已调研的结果，写验证脚本...")

         # If topic needs new research first:
         task(subagent_type="librarian", run_in_background=false, prompt="调研此技术点...")
         task(category="deep", load_skills=[], run_in_background=false, prompt="基于调研结果，写验证脚本...")
         ```

         Fire ALL deep agents in ONE message (Wave 2). If any topics need a new
         librarian, fire those first (Wave 1), then all deep agents.

      3. **User confirmation and finalize**: Present summary of findings. After user confirms,
         move `spectest/<topic>/` → `openspec/changes/<change-name>/research/<topic>/`.
         Create `research/index.md` summarizing all topics, conclusions, and key findings.

      4. **Update constitution-design.md**: Reference research findings in relevant sections.
         Use links like `详见 research/<topic>/notes.md`.

      **Important**:
      - research/ 是**可选的** — 只有 scan.md 中存在不确定点时才创建
      - research/ 是 side effect，不被 OpenSpec generations 跟踪
      - spectest/ 是临时目录，用户确认后数据才会移到 research/


      **Step 4（可选）：询问代码同步**

      - Use question tool to ask the user: "Do you want to scan existing code for constitution violations?"
      - If user confirms: add code sync logic to this design, and the tasks phase will include
        an additional task for fixing violations
      - If user declines: skip, proceed with standard constitution creation only

      **Step 5：生成设计文档**

      将所有调研结果和设计决策打包，委托 category="deep" 生成 constitution-design.md：

      task(category="deep", load_skills=[], run_in_background=false,
           prompt="根据以下输入生成 constitution-design.md。

           技术栈分析结论：
           [将 scan.md 的核心技术决策填入此处]

           最佳实践调研结果：
           [将各技术的调研要点填入此处]

           用户确认的选项：
           [将用户批准/拒绝/修改的具体内容填入此处]

           代码同步模式：[用户是否选择了代码同步检测]

           生成的 constitution-design.md 必须包含：
           - 完整的章程结构设计，包括章节组织和模块布局
           - 基于已确认技术栈的最佳实践和编码标准
           - 架构约束和 cross-cutting concerns
           - 如果存在 research/ 目录，在相关决策中引用调研发现

           参考文档（Step 3 创建的临时文件）将在 apply 阶段最终确定。")

      Step 3 创建的参考文档是临时工作文件，将在 apply 阶段最终确定。
    requires:
      - scan
  - id: tasks
    generates: tasks.md
    description: Simple execution plan with 2 base tasks plus 1 optional task
    template: tasks.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 tasks.md。**


      === PHASE 1：理解上下文 ===


      Read every artifact file. Each has a specific role:

      | File | Role |
      |------|------|
      | `scan.md` | WHY — tech stack analysis, decisions |
      | `constitution-design.md` | HOW — reference structure, best practices |
      | `tasks.md` | DO — checkbox task list |

      How to use each artifact:
      - **scan.md** → list key technologies to determine task groupings
      - **constitution-design.md** → extract decisions to plan execution approach


      **Step 1: Quick Artifact Review**

      Before generating, quickly check:
      1. Does scan.md's technology decisions align with constitution-design.md's reference structure?
      2. Any contradictions between scan.md and constitution-design.md?
      → If issues found: STOP, list specifics, wait for user.
      → If all clean: Proceed.


      **Step 2: Invoke Oracle for Gap Analysis (MANDATORY)**

      Invoke Oracle before writing tasks.md. Oracle 会按信源优先级分析冲突并给出修复建议。
      在调用 Oracle 前，先读取所有 artifacts，然后在 prompt 中附上关键内容的原文。

      **Fast fail 保护**: 如果 Oracle task() 调用失败（超时、不可用、出错），立即停止工作流（**fast fail，不得降级**）：
      - 向用户报告：「❌ 差距分析中断：Oracle 调用失败。[错误信息]」
      - 不得自行分析 gap，不得自行生成 tasks.md
      - 等待用户介入

      task(subagent_type="oracle", run_in_background=false, prompt="我准备为此变更生成 tasks.md。

      已完成的产物原文（关键段落）：
      - **scan.md** 核心技术决策: [引用原文 2-3 句]
      - **constitution-design.md** 关键设计决策: [引用原文]

      请做 gap analysis，识别：
      1. 遗漏的需求或意图
      2. 表达模糊的地方
      3. scope creep / AI-slop
      4. 缺失的验收标准
      5. 未覆盖的边界情况
      6. **research 完整性**：
         - 检查 scan.md 中的不确定性信号
         - 如果 scan.md 有不确切表述但 research/ 中无对应调研 → 标记为 🔴 缺失

      **信源优先级（冲突处理依据）**：
      1. scan.md（最高）— 技术栈分析和决策
      2. research/（如果存在）— 实证调研结果，优先级高于未经验证的设计假设
      3. constitution-design.md — 参考结构设计

      **冲突处理规则**：
      - 低优先级与高优先级存在**明显冲突**时，给出具体的修改建议以对齐高优先级
      - 明确可自动修复的 → 标注「🔧 可自动修复：...」并说明修改内容
      - 需要用户判断的 → 标注「👤 需用户确认：...」并提供选项
      - 模糊不清的 → 标注「❓ 需追问：...」并说明需要什么信息")

      **说明**: 此循环是内容质量改进机制（Oracle 已成功完成 gap 分析 → subagent 修复 → 重新调用），
       不是 agent 调用失败的降级处理。如 Oracle 调用本身失败 → 按 fast fail 规则立即停住报错。

       应用 Oracle 的分析结果，循环执行以下冲突修复流程（**最多循环 3 轮**）：

       1. 如果有「🔧 可自动修复」项：
          对每个 🔧 项，读取 Oracle 指出的具体问题和修改建议，调用执行型 subagent 修复：
          task(category="unspecified-high", load_skills=[], run_in_background=false,
               prompt="根据以下 Oracle 差距分析结果修复对应的源文件或 artifact。
               只修复标注为 🔧 可自动修复的问题，不要修改其他内容。

               Oracle 修复建议：
               [将 Oracle 输出的 🔧 项及对应修改建议填入此处]")
          全部修复完成后，重新调用 Oracle 验证（回到本步骤）
      2. 如果只剩「👤 需用户确认」和/或「❓ 需追问」→ 停止循环
         - 需用户确认 → 提供方案让用户选择
         - 需追问 → 直接提问让用户回答
      3. 如果全部 ✅ Confirmed → Proceed
      4. **达到 3 轮上限时**：即使仍有「🔧 可自动修复」项，也停止循环，将所有未解决项汇总展示给用户


       === PHASE 2：通过 Deep Agent 生成 ===

       Package all artifacts content and Oracle gap analysis results into a
       comprehensive prompt. Then delegate generation to a focused agent:

       task(category="deep", load_skills=[], run_in_background=false,
            prompt="Generate a task list (tasks.md) for the following change.

            Input context:
            - Scan (技术栈分析): [将 scan.md 的核心技术决策填入此处]
            - Design (参考结构设计): [将 constitution-design.md 的关键设计决策填入此处]
            - Oracle gap analysis results: [将 Oracle 的输出和冲突修复结果填入此处]
            - Code sync mode: [如果用户选择了代码同步则填 true，否则 false]

            The task list MUST contain:

            **Base tasks (mandatory):**
            1. Update AGENTS.md — add or update the `## Constitution` section
            2. Create or update `.opencode/skills/constitution/` — SKILL.md and reference files

            **Optional task (only if code sync is true):**
            3. Fix existing code violations

            Format requirements:
            - Use `## Tasks` as section header
            - Use `### Wave N: Group Name` for sub-groupings
            - Each task starts with `- [ ] N.M Description`
            - Cover all tech stack decisions and design decisions from inputs
            - Reflect gap analysis results from Oracle
            - Be organized into logical waves of parallel-executable tasks")
    requires:
      - design
  - id: critic
    generates: critic.md
    description: >
      Plan generation and multi-agent review. Generates
      .sisyphus/plans/<change-name>.md (OMO plan) and critic.md
      (review report with verdict).
    template: critic.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 critic.md 和 .sisyphus/plans/<change-name>.md。**

      === PHASE 1：读取上下文 ===

      读取以下文件：
      - `openspec/changes/<change-name>/tasks.md` — checkbox task list
      - `openspec/changes/<change-name>/scan.md` — tech stack analysis
      - `openspec/changes/<change-name>/constitution-design.md` — constitution design
      - `openspec/changes/<change-name>/research/` — technical research (if exists)

      === PHASE 2：基础结构检查 ===

      Check the basic structure of the change:
      1. `ls openspec/changes/<change-name>/scan.md` — scan.md 存在
      2. `ls openspec/changes/<change-name>/constitution-design.md` — constitution-design.md 存在
      3. `test -f openspec/changes/<change-name>/tasks.md && echo exists` — tasks.md 存在
      4. `grep -c '^- \[' openspec/changes/<change-name>/tasks.md` — 至少 1 个 task checkbox

      If ANY check fails: STOP, list what's missing, wait for user.
      If all pass: Proceed.

      === PHASE 3：Oracle + Metis 并行审查 tasks.md ===

      同时启动 1 个 Oracle + 1 个 Metis agent 并行审查 tasks.md。
      Oracle 专注于内容拆分合理性，Metis 专注于 OMO 格式合规性。

      ```
      ORACLE_REVIEW_PROMPT = "你正在对一个 OpenSpec change 的任务清单（tasks.md）进行 Oracle 评审。
      评审目标：评估任务拆分的合理性（内容导向）。
      按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

      审查文件：
      - tasks:    openspec/changes/<change-name>/tasks.md
      - scan:     openspec/changes/<change-name>/scan.md
      - design:   openspec/changes/<change-name>/constitution-design.md

      信源优先级（冲突处理依据）：
      1. scan.md（最高）— 技术栈分析和决策
      2. constitution-design.md — 参考结构设计

      请逐一检查以下 3 个维度：

      维度 1 — 内容拆分合理性：
      - 每个 task 是否足够原子化？
      - Wave 分组是否合理？同一 Wave 内的 task 是否互不依赖？

      维度 2 — 优化建议（从内容必要性出发）：
      - 哪些 task 之间的依赖是虚假的？
      - 每个 Wave 是否有足够的并发度？
      - 如果调整并发/顺序，是否会影响质量？

      维度 3 — 完整性与覆盖度：
      - scan.md 和 constitution-design.md 的要求是否都有对应 task？
      - 有无遗漏的边界场景？

      输出格式：先逐维度分析，然后汇总问题清单，每个问题标注 severity。"

      METIS_REVIEW_PROMPT = "你正在对一个 OpenSpec change 的任务清单（tasks.md）进行 Metis 评审。
      评审目标：评估 OMO 格式合规性（格式规则驱动）。
      按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

      审查文件：
      - tasks: openspec/changes/<change-name>/tasks.md

      OMO Task 标准子字段（共 9 个）：
      1. **What to do** — 可执行的实施步骤
      2. **Must NOT do** — 明确的排除项
      3. **Recommended Agent Profile** — category + skills
      4. **References** — 代码模式参考
      5. **Acceptance Criteria** — 可执行的验证命令
      6. **QA Scenarios** — 强制：快乐路径 + 失败路径
      7. **Parallelization** — 并行组、阻塞关系
      8. **Evidence** — 验证证据路径
      9. **Commit** — 是否提交及信息

      OMO Wave 规则：
      - Wave = 一组可并发执行的任务，同一 Wave 内默认并发
      - 不同 Wave 之间串行
      - 只有 Input dependency 和 File conflict 需要串行

      请逐一检查以下 3 个维度：

       维度 1 — OMO 格式合规性（逐 task 表格检查）：
       | Task | What to do | Must NOT do | Agent Profile | References | Acceptance Criteria | QA Scenarios | Parallelization | Evidence |
       |------|-----------|-------------|---------------|------------|-------------------|--------------|-----------------|----------|
       - QA Scenarios 是否包含 Tool/Preconditions/Steps/Expected/Evidence 五要素？
         1. **Tool**: 验证工具（如 Playwright / Bash / curl）
         2. **Preconditions**: 前置条件（如"用户已登录"、"数据库包含测试数据"）
         3. **Steps**: 具体操作步骤（如"点击按钮"、"发送 GET 请求到 /api/user"）
         4. **Expected**: 预期结果（具体可观测的值，如"状态码 200"、"元素可见"）
         5. **Evidence**: 证据路径（如 .sisyphus/evidence/task-N.M-xxx.png）

      维度 2 — Wave 结构合规性：
      - Wave 命名是否清晰？
      - Wave 内任务数量是否合理？
      - 是否有 Wave 中混入了有依赖关系的 task？

      维度 3 — 优化建议（从格式规则出发）：
      - 哪些 task 的 QA Scenarios 不足？
      - 所有优化建议必须标注「质量影响：无/低/中/高」"

      task(subagent_type="oracle", run_in_background=false, prompt=ORACLE_REVIEW_PROMPT)
      task(subagent_type="metis", run_in_background=false, prompt=METIS_REVIEW_PROMPT)
      ```

      **收集评审结果（以下步骤不可跳过）**：

      1. **逐 agent 提取发现**：先读取 Oracle 完整输出，列出所有 🔴/🟡/⚪。再读取 Metis 完整输出，列出所有 🔴/🟡/⚪。
      2. **自检**：确认两个 agent 结果都已读完。如有遗漏，回到 Step 1 重新读取。
      3. **合并去重**：按 severity 合并，标注来源（Oracle / Metis）。同一问题两个 agent 都发现时取更高 severity。
      4. **分类判定**：
         - 任一 agent 有 🔴 → BLOCKED，修复源文件后重新运行 PHASE 3（**最多 3 轮**，超限后汇总 🔴 问题给用户）
          **说明**: 此循环是内容质量改进机制（审查 agent 已成功完成分析 → subagent 修复 → 重新审查），
           不是 agent 调用失败的降级处理。如审查 agent 调用本身失败 → 按 fast fail 规则立即停住报错。
          - 仅 🟡/⚪ → 评估后决定是否修复
       5. **产出合并清单**：将合并后的发现清单写入输出，供后续 PHASE 引用。

      === PHASE 4：生成计划 ===

      生成 `.sisyphus/plans/<change-name>.md` — OMO 兼容执行计划。

      Delegate plan generation via category="deep":

      task(category="deep", load_skills=[], run_in_background=false,
           prompt="为以下变更生成 OMO 兼容的执行计划，保存到 .sisyphus/plans/<change-name>.md。

           输入文件摘要（已读取）：
           - Scan（技术栈分析）：[将 scan.md 的核心技术决策填入此处]
           - Design（参考结构设计）：[将 constitution-design.md 的关键设计决策填入此处]
           - Task list（任务列表）：[将 tasks.md 的完整 task 列表填入此处]
           - Research（调研结果）：[将 research/ 的关键发现填入此处，没有则填无]

           计划必须包含以下 7 个部分，使用 summary + link 格式：
           1. ## TL;DR（摘要）
           2. ## Context（上下文）
           3. ## Work Objectives（工作目标）
           4. ## Execution Strategy（执行策略）— 引用 constitution-design.md 和 research/
           5. ## Tasks（任务）— tasks.md 的 checkbox 展开，每个 task 含 What to do / Must NOT do / Agent Profile / References / Acceptance Criteria / QA Scenarios / Parallelization / Evidence / Commit
           6. ## Final Verification Wave（最终验证波）— F1~F4
           7. ## Success Criteria（成功标准）

           注意：根据 Design Decision 6，跳过 Verification Strategy 和 Commit Strategy 部分。

           关键规则：
           - Task 编号必须与 tasks.md 一致
           - 不要复制 artifact 原文（Tasks 的 What to do 部分除外）
           - Acceptance Criteria 必须是可执行的命令")

      === PHASE 5：Plan 结构验证 ===

      编写 plan 后，执行以下验证：
      1. `grep -c '^## ' .sisyphus/plans/<change-name>.md` → 必须至少 7 个（跳过 Verification Strategy 和 Commit Strategy）
      2. `grep -q '## Tasks' .sisyphus/plans/<change-name>.md` → Tasks 部分存在
      3. `grep -q '## Final Verification Wave' .sisyphus/plans/<change-name>.md` → FVW 存在
      4. `sed -n '/^## Tasks/,/^## /p' .sisyphus/plans/<change-name>.md | grep -c '^- \['` 应等于 `grep -c '^- \[' openspec/changes/<change-name>/tasks.md`

      如果任何检查不通过：停止，修复 plan，重新验证（**最多 3 轮**，超限后汇总给用户）。

      === PHASE 6：Oracle + Metis + Momus 并行审查 Plan ===

      同时启动 1 个 Oracle + 1 个 Metis + 1 个 Momus agent 并行审查生成的 plan。
      Oracle 专注于 content 层面：设计对齐、成功标准。
      Metis 专注于 quality 层面：结构、QA Scenarios、Wave 并发。
      Momus 专注于最终可执行性判定：执行路径审查 + 风险矩阵审查。

      ```
      ORACLE_PLAN_REVIEW_PROMPT = "你正在评审 OMO plan 的内容准确性（Oracle 评审）。
      按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

      审查文件：
      - plan:  .sisyphus/plans/<change-name>.md
      - design: openspec/changes/<change-name>/constitution-design.md
      - tasks: openspec/changes/<change-name>/tasks.md
      - research: openspec/changes/<change-name>/research/（如果存在）

      信源优先级（冲突处理依据）：
      1. scan.md（最高）— 技术栈分析和决策
      2. constitution-design.md — 参考结构设计

      请逐一检查以下 3 个维度：

      维度 1 — Design Alignment：
      - plan 的 Execution Strategy 是否反映了 constitution-design.md 的决策？
      - research/ 的调研发现是否在 Execution Strategy 中被引用？

      维度 2 — Verification Strategy：
      - FVW（Final Verification Wave）是否合理？

      维度 3 — Success Criteria：
      - Success Criteria 是否可衡量？

      输出格式：逐维度分析 + 问题汇总。"

      METIS_PLAN_REVIEW_PROMPT = "你正在评审 OMO plan 的结构和质量（Metis 评审）。
      按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

      审查文件：
      - plan: .sisyphus/plans/<change-name>.md
      - research: openspec/changes/<change-name>/research/（如果存在）

      请逐一检查以下 3 个维度：

      维度 1 — 结构完整性：
      - 所有 7 个 section 是否都存在？
      - 每个 section 是否使用 summary + link 模式？

      维度 2 — QA Scenarios 质量：
      - 每个 task 的 QA Scenarios 是否包含五要素？

      维度 3 — Wave 结构与并发：
      - Wave 分组是否合理？
      - 同一 Wave 内的 task 是否确实可以并发执行？
      - 如果 research/ 存在：调研发现是否在 plan 中得到体现？

      输出格式：逐维度分析 + 问题汇总。"

      MOMUS_PLAN_REVIEW_PROMPT = "你正在对 OMO plan 执行双重门禁审查（Momus 评审）。

      **Part A — 执行路径审查**：
      1. Wave 依赖是否合理？同一 Wave 内的 task 是否真的可以并发？
      2. 每个 task 的 Acceptance Criteria 是否可执行？
      3. FVW 是否覆盖了关键验证点？
      4. 如果 research/ 存在：调研结论是否被 plan 正确引用？

      **Part B — 风险矩阵审查**：
      1. 是否有遗漏的边界场景？
      2. QA Scenarios 是否至少包含一个快乐路径 + 一个失败路径？
      3. Success Criteria 是否真正可衡量？
      4. 如果 research/ 存在：是否有 research 发现未被 plan 覆盖？

      审查文件：
      - plan:  .sisyphus/plans/<change-name>.md
      - tasks: openspec/changes/<change-name>/tasks.md
      - research: openspec/changes/<change-name>/research/（如果存在）

      最终判定（综合 Part A 和 Part B）：
      - ✅ OKAY — plan 可执行
      - ❌ REJECT — plan 不可执行，需要修复后重新评审"

      task(subagent_type="oracle", run_in_background=false, prompt=ORACLE_PLAN_REVIEW_PROMPT)
      task(subagent_type="metis", run_in_background=false, prompt=METIS_PLAN_REVIEW_PROMPT)
      task(subagent_type="momus", run_in_background=false, prompt=MOMUS_PLAN_REVIEW_PROMPT)
      ```

      **收集评审结果（以下步骤不可跳过）**：

      1. **逐 agent 提取发现**：读取 Oracle 完整输出 → 读取 Metis 完整输出 → 读取 Momus 完整输出。每个 agent 单独列出发现。
      2. **自检**：确认所有 3 个 agent 结果都已读完。如有遗漏，回到 Step 1 重新读取。
      3. **合并去重**：按 severity 合并，标注来源（Oracle / Metis / Momus）。同一问题多个 agent 都发现时取更高 severity。
      4. **分类判定**：
         - Momus ❌ REJECT → 修复 plan 后重新运行 PHASE 6（**最多 3 轮**，超限后汇总给用户）
          - Oracle/Metis 有 🔴 → BLOCKED，修复 plan 后重新运行 PHASE 6（**最多 3 轮**，超限后汇总给用户）
          **说明**: 此循环是内容质量改进机制（审查 agent 已成功完成分析 → subagent 修复 → 重新审查），
           不是 agent 调用失败的降级处理。如审查 agent 调用本身失败 → 按 fast fail 规则立即停住报错。
          - 仅 🟡/⚪ → 评估后决定是否修复
       5. **产出合并清单**：将合并后的发现清单写入输出，供后续 PHASE 引用。

      === PHASE 7：通过 Deep Agent 生成 critic.md ===

      Package the complete review findings from PHASE 3 and PHASE 6 into a
      comprehensive prompt. Then delegate to a focused agent:

      task(category="deep", load_skills=[], run_in_background=false,
           prompt="Generate the critic.md file for this OpenSpec change.

           Review findings from PHASE 3 (tasks.md review by Oracle + Metis):
           [将 PHASE 3 的 Oracle 和 Metis 审查发现的 🔴/🟡/⚪ 清单填入此处]

           Review findings from PHASE 6 (plan review by Oracle + Metis + Momus):
           [将 PHASE 6 的 Oracle、Metis、Momus 审查发现的 🔴/🟡/⚪ 清单填入此处]

           The critic.md MUST:
           - Follow the template at `schemas/constitution/templates/critic.md`
           - Include a summary of ALL review findings from both phases
           - List findings grouped by source (Oracle / Metis / Momus)
           - For each finding, include severity (🔴/🟡/⚪) and description

           Determine VERDICT:
           - Momus ❌ REJECT or any 🔴 from others → **🔴 BLOCKED**
           - Only 🟡/⚪ → **⚠️ CONDITIONAL**
           - No issues → **✅ PASS**")

      === PHASE 8：阻塞判定 ===

      - If BLOCKED: "🛑 Critic BLOCKED. Fix 🔴 issues above, then re-create critic artifact. Re-run critic（最多 3 轮）。"
      - If CONDITIONAL: List 🟡 items. User can acknowledge risks or fix.
      - If PASS: "✅ All checks passed. Proceed to apply."
    requires:
      - tasks
apply:
  requires:
    - critic
  tracks: tasks.md
  instruction: |
    __LANG_PLACEHOLDER__

    **重要：本指令覆盖 skill/command 的执行逻辑。
    忽略任何外部的"步骤 6"要求逐一手动执行任务。
    仅遵循本指令的流程：verdict 检查 → `/start-work` → Oracle 验证 → 同步。**

    先读取 `openspec/changes/<change-name>/critic.md`，检查 VERDICT：

    1. 读取 `## Verdict` 部分，找到 `**VERDICT**: ...`
    2. 如果 `🔴 BLOCKED`：停止。输出"🛑 Critic 阻塞了此变更。修复问题后重新运行 critic。"不要继续
    3. 如果 `⚠️ CONDITIONAL`：列出 🟡 项。要求用户确认后再继续
    4. 如果 `✅ PASS`：继续

    VERDICT 确认后，调用：
    ```
    /start-work .sisyphus/plans/<change-name>.md
    ```

    这会调用 OMO 内置的计划执行器（Atlas），读取计划文件并执行任务，包含委托、验证和会话连续性。

    `/start-work` 完成后，捕获变更文件列表：
    ```
    git diff --name-only HEAD
    ```
    这告诉 Oracle 哪些文件被此变更创建或修改。
    然后运行 Oracle 验证，最多 3 轮。

     如果 Oracle task() 调用失败（超时、不可用、出错），立即停止工作流（**fast fail，不得降级**）：
     - 向用户报告：「❌ 实现验证中断：Oracle 调用失败。[错误信息]」
     - 不得自行分析 git diff，不得自行生成 verify.md，不得自行判定
     - 等待用户介入

    ```
    task(subagent_type="oracle", run_in_background=false, prompt="你正在验证实现产出与 OpenSpec change artifacts 的一致性。
    请检查所有实现产出（AGENTS.md、.opencode/skills/constitution/ 下的文件等）是否按 scan.md 和 constitution-design.md 的要求正确实现。
    按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

    审查文件：
    - scan:     openspec/changes/<change-name>/scan.md
    - design:   openspec/changes/<change-name>/constitution-design.md
    - tasks:    openspec/changes/<change-name>/tasks.md
    - plan:     .sisyphus/plans/<change-name>.md
    - research: openspec/changes/<change-name>/research/（如果存在）

    变更文件清单（来自 git diff --name-only HEAD）：
    [在此填入上个命令的输出]

    请逐一检查变更文件是否满足以下条件：

    维度 1 — scan 合规性：
    - scan.md 中的技术选型决策是否在实现中得到正确体现？
    - 所有已决定的技术栈是否在 SKILL.md 和 reference 文件中正确记录？

    维度 2 — Design 对齐（实现与 Design 一致性）：
    - 实现方案是否符合 constitution-design.md 的设计决策？
    - 目录结构和参考文件组织是否与设计一致？
    - research/ 中的调研结论是否在实现中得到正确应用？

    维度 3 — 范围完整性：
    - 是否所有已确认的技术栈都有对应的 reference 文件？
    - 是否有超出定义范围的漏加或多余内容？
    - tasks.md 中的所有 task 是否有对应实现产出？

    输出格式：逐维度分析 + 问题汇总 + 总体结论。

    最终判定标准：
    - 🔴 BLOCKED：存在严重的实现偏离，必须修复才能继续
    - ⚠️ CONDITIONAL：实现基本正确但有 🟡/⚪ 瑕疵，可接受风险继续推进
    注意：请谨慎区分 BLOCKED 和 CONDITIONAL。只有确实阻碍功能正确性的问题才标 🔴。

    将完整结果保存到 openspec/changes/<change-name>/verify-round-{N}.md。")
    ```

    读取 `openspec/changes/<change-name>/verify-round-{N}.md` 中的最终判定：
    1. 如果 ✅ PASS → 通过，继续
     2. 如果 🔴 BLOCKED：
          读取 verify-round-{N}.md 中的 🔴 问题列表。
          对每个 🔴 问题，调用执行型 subagent 修复：
          task(category="unspecified-high", load_skills=[], run_in_background=false,
               prompt="根据以下变更验证结果修复实现产出。只修复标注为 🔴 的问题，不要修改 🟡/⚪ 内容。

               Oracle 验证结果中的 🔴 问题：
               [将 verify-round-{N}.md 中的 🔴 问题列表及修复建议填入此处]")
          **修复策略**：
          - 每轮最多修复 3 个 🔴 问题，防止一次改动过大引入新问题
          - 修复前记录当前状态（git stash），以便失败后回滚
          - 修复后不要重新运行 /start-work，只修改产出文件
          修复完成后重新运行 Oracle 验证（**最多 3 轮**，超限后汇总给用户）
           **说明**: 此循环是内容质量改进机制（Oracle 已成功完成验证 → subagent 修复 → 重新验证），
           不是 agent 调用失败的降级处理。如 Oracle 调用本身失败 → 按 fast fail 规则立即停住报错。
    3. 如果 ⚠️ CONDITIONAL → 汇总 🟡/⚪ 问题展示给用户，让用户决定是接受继续还是修复后再重新运行 Oracle 验证

    **初始化/更新检测**：
    - 执行前，检查 `.opencode/skills/constitution/SKILL.md` 和 `AGENTS.md` 的 `## Constitution` 部分是否存在
    - 两者都存在 → **更新模式**：diff 现有内容，要求用户确认
    - 两者都缺失 → **初始化模式**：从头创建所有文件
    - 部分存在 → **不完整模式**：警告用户，提供选项（覆盖/补全/中止）

    **输出质量验证**：
    `/start-work` 完成后，验证创建的输出文件：
    1. **SKILL.md frontmatter**：检查 `.opencode/skills/constitution/SKILL.md` 是否有有效的 YAML frontmatter，包含 `name: constitution` 和非空的 `description`。用 grep 查找 `^---` 边界
    2. **AGENTS.md constitution 部分**：检查 `AGENTS.md` 是否包含 `## Constitution`
    3. **核心参考文件**：检查必要的参考文件是否存在（tech-stack.md、architecture.md 等）
    4. **参考链接完整性**：检查 SKILL.md 的参考链接是否指向 `.opencode/skills/constitution/references/` 下的现有文件

    如果任何验证失败：警告用户并提供修复选项。

    **同步协议**：
    - plan 文件的 `## Tasks` 部分跟踪 `/start-work` 的 checkbox 状态
    - `openspec/changes/<change-name>/tasks.md` 是 OpenSpec 的真实来源
    - `/start-work` 完成或暂停后，将 `.sisyphus/plans/<change-name>.md` 的 checkbox 状态复制到
      `openspec/changes/<change-name>/tasks.md` 保持同步
    - 运行以下命令验证暂停/完成时的状态一致性：
      diff <(grep '^- \[' openspec/changes/<change-name>/tasks.md) <(sed -n '/^## Tasks/,/^## /p' .sisyphus/plans/<change-name>.md | grep '^- \[')
