name: constitution
version: 1
description: Independent schema for project constitution initialization and updates - scan → design → tasks → critic → apply
artifacts:
  - id: scan
    generates: scan.md
    description: Ask user to select constitution dimension(s) and gather requirements
    template: scan.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 scan.md。**

      === Step 1：询问用户要添加哪个维度 ===

      使用 question 工具询问用户要添加哪个维度的宪法：

      ```
      可选维度列表：
      1. code-conventions   — 代码风格/命名/注释/import/函数规范
      2. architecture        — 分层/模块/依赖方向
      3. domain             — 核心实体/业务模型/值对象/聚合根
      4. integration        — 外部API/数据库/消息队列等外部依赖
      5. api                — 我对外提供的接口规范
      6. security           — 认证/授权/加密/输入验证
      7. testing            — 测试策略/覆盖率/Mock规范
      8. observability       — 日志/监控/告警/错误处理
      9. release            — Git/Commit规范/CI-CD/发布流程
      10. documentation     — README/ADR/变更日志

      请告诉我要添加哪个维度的宪法（可以说序号或名称）。
      ```

      === Step 2：检查是否已存在 ===

      根据用户选择的维度，运行以下命令检查是否已存在该维度的宪法：

      ```bash
      # 检查 docs/constitution/ 是否存在
      ls docs/constitution/ 2>/dev/null || echo "docs/constitution/ does not exist"

      # 如果存在，检查该维度的 constitution.yaml
      cat docs/constitution/<dimension>/constitution.yaml 2>/dev/null || echo "No constitution.yaml found"
      ```

      如果该维度已存在：
      - 告知用户该维度已存在
      - 询问用户是要更新（UPDATE）还是跳过（SKIP）
      - 如果是 UPDATE，读取现有 constitution.yaml 了解已有条目

      === Step 3：确认用户需求 ===

      通过对话了解用户的具体需求：
      - 如果是 code-conventions：需要支持哪些语言？有什么特殊要求？
      - 如果是 integration：需要集成哪些外部系统？
      - 如果是 api：主要对外暴露哪些接口？
      - 如果是其他维度：用户想约束什么？

      记录用户确认的内容和不确定的点（标记 [NEEDS RESEARCH]）。

      === Step 4：生成 scan.md ===

      打包上下文，委托 category="write" 生成 scan.md：

      task(category="write", load_skills=[], run_in_background=false,
          prompt="生成 scan.md 文件。

          输入文件（请直接读取）：
          - scan.md 模板：schemas/constitution/templates/scan.md

          直接传入的上下文：
          - 用户选择的维度：[填入用户选择的维度名称]
          - 适用技术栈：[填入用户确认的技术栈，或"通用"]
          - 用户需求摘要：[填入用户描述的具体需求]
          - 该维度是否已存在：[是/否]
          - 已有条目：[从 constitution.yaml 读取的内容，如果没有则填"无"]

          按模板结构输出。所有维度中，只聚焦用户选择的维度，其他维度留空或标注'非本次聚焦'。")
    requires: [ ]
  - id: design
    generates: design.md
    description: Research best practices for the selected dimension and design reference structure
    template: design.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 design.md。**

      === Step 1：读取 scan.md ===

      读取 `openspec/changes/<change-name>/scan.md`，确认：
      - 聚焦哪个维度
      - 适用技术栈
      - 用户需求摘要

      === Step 2：调研最佳实践 ===

      根据用户选择的维度，启动 librarian agent 调研该维度的业界最佳实践：

      task(subagent_type="librarian", run_in_background=false,
           prompt="调研项目章程中【{dimension}】维度的业界最佳实践。

           已确认的信息：
           - 维度：{dimension}
           - 适用技术栈：{tech_stack}
           - 用户需求：{user_requirements}

           请调研：
           1. 该维度的核心内容是什么？
           2. 业界有哪些标准和最佳实践？（Google Style Guide、Uber Go Guide、OWASP 等）
           3. 每个技术栈有什么特有的规范？
           4. 常见的坑是什么？

           输出：
           - 该维度的核心规则列表
           - 参考资料（URL + 关键摘要）
           - 技术栈特有规则（按技术栈分类）

           将结果保存到 openspec/changes/<change-name>/research/<dimension>/")

      === Step 3：展示调研结果 ===

      向用户展示调研结果，确认或修改。

      === Step 4：生成 design.md ===

      task(category="write", load_skills=[], run_in_background=false,
          prompt="生成 design.md 文件。

          输入文件（请直接读取）：
          - 模板：schemas/constitution/templates/design.md
          - Scan：openspec/changes/<change-name>/scan.md
          - Research：openspec/changes/<change-name>/research/<dimension>/（如果存在）

          直接传入的上下文：
          - 聚焦维度：[填入本次聚焦的维度]
          - 用户确认内容：[填入用户批准的规则]

          按模板结构输出。只聚焦用户选择的维度，其他 9 个维度保持占位符（标注'非本次聚焦'）。")
    requires:
      - scan
  - id: tasks
    generates: tasks.md
    description: Generate tasks for creating the selected constitution dimension
    template: tasks.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 tasks.md。**

      === Step 1：读取上下文 ===

      读取 scan.md 和 design.md，确认：
      - 聚焦哪个维度
      - 该维度是否已存在（scan 中记录）
      - 设计决策

      === Step 2：生成任务清单 ===

      task(category="write", load_skills=[], run_in_background=false,
          prompt="为以下变更生成 tasks.md。

          输入文件（请直接读取）：
          - Scan：openspec/changes/<change-name>/scan.md
          - Design：openspec/changes/<change-name>/design.md

          任务清单必须包含以下 tasks：

          **Task 1：创建 docs/constitution/<dimension>/ 目录结构**

          创建以下文件：
          - `docs/constitution/<dimension>/constitution.yaml` — 元数据表
          - `docs/constitution/<dimension>/universal.md` — 通用规范（所有技术栈共用）
          - `docs/constitution/<dimension>/<tech1>.md` — 技术栈特有规范（如适用）

          constitution.yaml 格式：
          ```yaml
          dimension: <dimension>
          description: <维度说明>
          items:
            - tech_stack: []
              status: active
              summary: <规范摘要>
              file: universal.md

            - tech_stack: [<tech>]
              status: active
              summary: <规范摘要>
              file: <tech>.md
          ```

          **Task 2：更新 AGENTS.md**

          读取 AGENTS.md，找到 `<!-- constitution-start -->` 和 `<!-- constitution-end -->` 之间的现有内容，追加新维度。

          使用以下标准格式（参考 `schemas/constitution/templates/section.md`）：
          ```markdown
          - **<dimension>** → `docs/constitution/<dimension>/`
            - 通用: <规范摘要>
            - <tech>: <特有规范摘要>（如适用）
          ```

          **注意**：
          - 如果该维度已存在（scan 中标记为 UPDATE 模式），先读取现有的 constitution.yaml，然后在对应 tech_stack 下追加或更新条目，不要覆盖整个文件
          - 如果是全新维度（INIT 模式），直接追加到 AGENTS.md

          格式要求：
          - 使用 `## Tasks` 作为部分标题
          - 使用 `### Wave N: Group Name` 子分组
          - 每个 task 以 `- [ ] N.M Description` 开头")
    requires:
      - design
  - id: critic
    generates: critic.md
    description: >
      Plan generation and multi-agent review for constitution items.
      Generates .omo/plans/<change-name>.md and critic.md.
    template: critic.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 critic.md 和 .omo/plans/<change-name>.md。**

      === PHASE 1：读取上下文 ===

      读取以下文件：
      - `openspec/changes/<change-name>/tasks.md`
      - `openspec/changes/<change-name>/scan.md`
      - `openspec/changes/<change-name>/design.md`

      === PHASE 2：基础结构检查 ===

      检查：
      1. scan.md、design.md、tasks.md 都存在
      2. tasks.md 至少 1 个 checkbox

      如果任何检查失败：停止，列出缺失项，等待用户。

      === PHASE 3：生成 Plan ===

      task(category="write", load_skills=[], run_in_background=false,
          prompt="生成 .omo/plans/<change-name>.md。

          输入文件（请直接读取）：
          - Tasks：openspec/changes/<change-name>/tasks.md
          - Scan：openspec/changes/<change-name>/scan.md
          - Design：openspec/changes/<change-name>/design.md

          计划必须包含：
          1. ## TL;DR
          2. ## Context（来自 scan.md）
          3. ## Work Objectives
          4. ## Execution Strategy
          5. ## Tasks（从 tasks.md 展开）
          6. ## Final Verification Wave
          7. ## Success Criteria

          跳过 Verification Strategy 和 Commit Strategy。")

      === PHASE 4：Plan 结构验证 ===

      验证：
      1. 所有 7 个 section 都存在
      2. Tasks 数量与 tasks.md 一致

      === PHASE 5：Oracle + Momus 并行审查 ===

      task(subagent_type="oracle", run_in_background=false,
           prompt="审查 .omo/plans/<change-name>.md。

           检查：
           - 内容完整性
           - 可执行性
           - 边界场景覆盖

           输出：🔴/🟡/⚪ 问题清单。")

      task(subagent_type="momus", run_in_background=false,
           prompt="对 plan 执行门禁判定。

           审查文件：
           - plan: .omo/plans/<change-name>.md
           - tasks: openspec/changes/<change-name>/tasks.md

           判定：
           - ✅ OKAY — 可执行
           - ❌ REJECT — 需修复")

      收集结果，如果有 🔴 或 REJECT，修复后重新审查（最多 3 轮）。

      === PHASE 6：生成 critic.md ===

      task(category="write", load_skills=[], run_in_background=false,
          prompt="生成 critic.md。

          输入文件（请直接读取）：
          - 模板：schemas/constitution/templates/critic.md

          审查发现：
          - Oracle 发现：[填入 🔴/🟡/⚪]
          - Momus 判定：[OKAY/REJECT]

          判定标准：
          - REJECT 或 🔴 → 🔴 BLOCKED
          - 仅 🟡/⚪ → ⚠️ CONDITIONAL
          - 无问题 → ✅ PASS")

      === PHASE 7：阻塞判定 ===

      - 🔴 BLOCKED：修复后重新运行 critic
      - ⚠️ CONDITIONAL：列出 🟡 项，用户确认后可继续
      - ✅ PASS：继续 apply
    requires:
      - tasks
apply:
  requires:
    - critic
  tracks: tasks.md
  instruction: |
    __LANG_PLACEHOLDER__

    **重要：本指令覆盖 skill/command 的执行逻辑。
    仅遵循本指令的流程：verdict 检查 → `/start-work` → Oracle 验证 → 同步。**

    === Step 1：检查 VERDICT ===

    读取 `openspec/changes/<change-name>/critic.md`，检查 `**VERDICT**: ...`

    - 🔴 BLOCKED：停止，输出"🛑 Critic 阻塞。修复后重新运行 critic。"
    - ⚠️ CONDITIONAL：列出 🟡 项，用户确认后再继续
    - ✅ PASS：继续

    === Step 2：检测运行模式 ===

    ```bash
    # 检查 docs/constitution/ 是否存在
    ls docs/constitution/ 2>/dev/null && echo "docs/constitution/ exists" || echo "docs/constitution/ does not exist"

    # 检查 AGENTS.md 是否有 Constitution 内容
    count=$(find . -name "AGENTS.md" -type f -not -path '*/node_modules/*' -not -path '*/.git/*' 2>/dev/null | xargs grep -l 'constitution-start' 2>/dev/null | wc -l)
    echo "Found $count AGENTS.md files with constitution content"
    ```

    - docs/constitution/ 存在 且 count > 0 → **APPEND 模式**
    - 两者都不存在 → **INIT 模式**
    - 只有其中之一存在 → **不完整模式**：警告用户

    === Step 3：执行 /start-work ===

    ```
    /start-work .omo/plans/<change-name>.md
    ```

    `/start-work` 完成后，验证输出文件：
    1. `docs/constitution/<dimension>/constitution.yaml` 存在且格式正确
    2. `docs/constitution/<dimension>/universal.md` 存在且有内容
    3. AGENTS.md 的 `<!-- constitution-start -->` 和 `<!-- constitution-end -->` 之间有新维度条目

    如果验证失败：警告用户并提供修复选项。

    === Step 4：Oracle 验证（最多 3 轮） ===

    ```
    git diff --name-only HEAD
    ```

    将 git diff 输出传给 Oracle：

    task(subagent_type="oracle", run_in_background=false,
         prompt="验证 constitution 变更的实现产出。

         审查文件：
         - scan: openspec/changes/<change-name>/scan.md
         - design: openspec/changes/<change-name>/design.md
         - tasks: openspec/changes/<change-name>/tasks.md

         变更文件清单：
         [在此填入 git diff 输出]

         检查：
         1. docs/constitution/<dimension>/constitution.yaml 格式是否正确？
         2. docs/constitution/<dimension>/ 下的参考文件是否有实质内容？
         3. AGENTS.md 是否正确追加了新维度条目？
         4. 是否有遗漏或超出 scope 的内容？

         输出：🔴/🟡/⚪ 问题清单。最终判定：✅ PASS / 🔴 BLOCKED / ⚠️ CONDITIONAL

         将结果保存到 openspec/changes/<change-name>/verify-round-{N}.md。")

    读取验证结果：
    - ✅ PASS → 继续
    - 🔴 BLOCKED → 修复后重新验证（最多 3 轮）
    - ⚠️ CONDITIONAL → 汇总 🟡 项，用户决定是否继续

    === Step 5：同步 ===

    `/start-work` 完成后，将 `.omo/plans/<change-name>.md` 的 checkbox 状态复制到
    `openspec/changes/<change-name>/tasks.md` 保持同步。

    运行：
    ```
    diff <(grep '^- \[' openspec/changes/<change-name>/tasks.md) <(sed -n '/^## Tasks/,/^## /p' .omo/plans/<change-name>.md | grep '^- \[')
    ```
    验证状态一致。
