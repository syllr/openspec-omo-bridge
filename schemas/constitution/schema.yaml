name: constitution
version: 1
description: Simplified 3-stage schema for project constitution - scan → design → apply
artifacts:
  - id: scan
    generates: scan.md
    description: Ask user to select constitution dimension(s) and gather requirements
    template: scan.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 scan.md。**

      === Step 1：询问用户要添加哪个维度 ===

      使用 question 工具询问用户要添加哪个维度的宪法：

      ```
      可选维度列表：
      1. code-conventions   — 代码风格/命名/注释/import/函数规范
      2. architecture        — 分层/模块/依赖方向
      3. domain             — 核心实体/业务模型/值对象/聚合根
      4. integration        — 外部API/数据库/消息队列等外部依赖
      5. api                — 我对外提供的接口规范
      6. security           — 认证/授权/加密/输入验证
      7. testing            — 测试策略/覆盖率/Mock规范
      8. observability       — 日志/监控/告警/错误处理
      9. release            — Git/Commit规范/CI-CD/发布流程
      10. documentation     — README/ADR/变更日志

      请告诉我要添加哪个维度的宪法（可以说序号或名称）。
      ```

      === Step 2：检查是否已存在 ===

      根据用户选择的维度，运行以下命令检查是否已存在该维度的宪法：

      ```bash
      # 检查 docs/constitution/<dimension>/ 目录是否存在
      ls docs/constitution/<dimension>/ 2>/dev/null || echo "docs/constitution/<dimension>/ does not exist"
      ```

      如果该维度目录已存在，读取其中的 constitution.yaml：
      ```bash
      cat docs/constitution/<dimension>/constitution.yaml 2>/dev/null || echo "No constitution.yaml found"
      ```

      **constitution.yaml 是每个维度的元数据文件**，记录了该维度下已有哪些条目（按 tech_stack 分组）。它的结构如下：
      ```yaml
      dimension: <维度名>
      description: <维度说明>
      items:
        - tech_stack: []             # 空 = 所有技术栈通用的规则
          status: active
          summary: <规则摘要>
          file: universal.md         # 具体内容写在这个文件里

        - tech_stack: [python]       # 特定技术栈的规则
          status: active
          summary: <规则摘要>
          file: python.md
      ```

      通过读取 constitution.yaml，你可以判断：
      - 用户要添加的 tech_stack 是否已有条目 → **重复**，告知用户
      - 是同一个维度但不同 tech_stack → **可以追加**
      - 同一维度且同一 tech_stack → **询问用户是覆盖还是跳过**

      如果该维度已存在：
      - 告知用户该维度已存在，展示已有条目
      - 询问用户是要更新（UPDATE）还是跳过（SKIP）
      - 如果是 UPDATE，基于 constitution.yaml 确定是追加新 tech_stack 还是覆盖已有条目

      === Step 3：确认用户需求 ===

      通过对话了解用户的具体需求：
      - 如果是 code-conventions：需要支持哪些语言？有什么特殊要求？
      - 如果是 integration：需要集成哪些外部系统？
      - 如果是 api：主要对外暴露哪些接口？
      - 如果是其他维度：用户想约束什么？

      记录用户确认的内容和不确定的点（标记 [NEEDS RESEARCH]）。

      === Step 4：生成 scan.md ===

      打包上下文，委托 category="write" 生成 scan.md：

      task(category="write", load_skills=[], run_in_background=false,
          prompt="生成 scan.md 文件。

          输入文件（请直接读取）：
          - scan.md 模板：schemas/constitution/templates/scan.md

          直接传入的上下文：
          - 用户选择的维度：[填入用户选择的维度名称]
          - 适用技术栈：[填入用户确认的技术栈，或"通用"]
          - 用户需求摘要：[填入用户描述的具体需求]
          - 该维度是否已存在：[是/否]
          - 已有条目：[从 constitution.yaml 读取的内容，如果没有则填"无"]

          按模板结构输出。所有维度中，只聚焦用户选择的维度，其他维度留空或标注'非本次聚焦'。")
    requires: [ ]
  - id: design
    generates: design.md
    description: Research best practices for the selected dimension and design reference structure
    template: design.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 design.md。**

      === Step 1：读取 scan.md ===

      读取 `openspec/changes/<change-name>/scan.md`，确认：
      - 聚焦哪个维度
      - 适用技术栈
      - 用户需求摘要

      === Step 2：调研最佳实践 ===

      根据用户选择的维度，启动 librarian agent 调研该维度的业界最佳实践：

      task(subagent_type="librarian", run_in_background=false,
           prompt="调研项目章程中【{dimension}】维度的业界最佳实践。

           已确认的信息：
           - 维度：{dimension}
           - 适用技术栈：{tech_stack}
           - 用户需求：{user_requirements}

           请调研：
           1. 该维度的核心内容是什么？
           2. 业界有哪些标准和最佳实践？（Google Style Guide、Uber Go Guide、OWASP 等）
           3. 每个技术栈有什么特有的规范？
           4. 常见的坑是什么？

           输出：
           - 该维度的核心规则列表
           - 参考资料（URL + 关键摘要）
           - 技术栈特有规则（按技术栈分类）

           将结果保存到 openspec/changes/<change-name>/research/<dimension>/")

      === Step 3：展示调研结果 ===

      向用户展示调研结果，确认或修改。

      === Step 4：确定 constitution.yaml 结构 ===

      在生成 design.md 之前，先确定本次要生成的 constitution.yaml 结构：

      **constitution.yaml 是每个维度的元数据文件**，生成在 `docs/constitution/<dimension>/` 下。
      tasks 阶段会根据 design 结果创建这个文件，因此 design 时需要明确它的内容。

      结构示例：
      ```yaml
      dimension: <维度名>            # 必填
      description: <维度说明>         # 必填
      items:                         # 条目列表
        - tech_stack: []             # 空 = 所有技术栈通用的规则
          status: active             # active / proposed / under_review
          summary: <规则摘要>         # 简短描述，显示在 AGENTS.md 中
          file: universal.md         # 具体规范写入这个文件

        - tech_stack: [python]       # Python 特有规则
          status: active
          summary: <规则摘要>
          file: python.md
      ```

      根据调研结果和用户确认，确定：
      - 有哪些通用规则（tech_stack: []）→ 写入 universal.md
      - 有哪些技术栈特有规则 → 按 tech_stack 分文件
      - 如果是 UPDATE 模式，需要参照现有 constitution.yaml 决定是追加还是覆盖

      === Step 5：生成 design.md ===

      task(category="write", load_skills=[], run_in_background=false,
          prompt="生成 design.md 文件。

          输入文件（请直接读取）：
          - 模板：schemas/constitution/templates/design.md
          - Scan：openspec/changes/<change-name>/scan.md
          - Research：openspec/changes/<change-name>/research/<dimension>/（如果存在）

          直接传入的上下文：
          - 聚焦维度：[填入本次聚焦的维度]
          - 用户确认内容：[填入用户批准的规则]
          - constitution.yaml 结构设计（已确认）：
            [填入 Step 4 确认的 constitution.yaml 结构]

          按模板结构输出。只聚焦用户选择的维度，其他 9 个维度保持占位符（标注'非本次聚焦'）。")
    requires:
      - scan
  # tasks 和 critic 阶段已删除：对于 constitution 场景，
  # 产出只是几个文档文件，不需要复杂的执行计划和多 agent 评审。
  # apply 直接基于 design 输出创建文件。
apply:
  requires:
    - design
  tracks: design.md
  instruction: |
    __LANG_PLACEHOLDER__

    **重要：tasks 和 critic 阶段已删除。apply 直接基于 design 输出创建文件。**

    === Step 1：读取上下文 ===

    读取 `openspec/changes/<change-name>/scan.md` 和 `openspec/changes/<change-name>/design.md`，确认：
    - 聚焦哪个维度
    - 该维度是否已存在
    - constitution.yaml 结构（items 列表、tech_stack 分组）
    - 每个文件的规范内容

    === Step 2：检测运行模式 ===

    ```bash
    # 检查 docs/constitution/ 是否存在
    ls docs/constitution/ 2>/dev/null && echo "docs/constitution/ exists" || echo "docs/constitution/ does not exist"

    # 检查根目录 AGENTS.md 是否有 Constitution 内容
    test -f AGENTS.md && grep -q 'constitution-start' AGENTS.md && echo "AGENTS.md has constitution content" || echo "AGENTS.md has no constitution content"
    ```

    - docs/constitution/ 存在 且 AGENTS.md 有 constitution 内容 → **APPEND 模式**
    - 两者都不存在 → **INIT 模式**
    - 只有其中之一存在 → **不完整模式**：警告用户

    === Step 3：直接创建文件 ===

    **不需要 /start-work，不需要 plan 文件。直接按 design 产出创建文件。**

    **3.1 创建目录**

    ```bash
    mkdir -p docs/constitution/<dimension>/
    ```

    **3.2 创建 / 更新 constitution.yaml**

    APPEND 模式：
    1. 读取现有的 `docs/constitution/<dimension>/constitution.yaml`
    2. 在 items 列表中追加新条目（保留已有条目，不要覆盖）
    3. 写回文件

    INIT 模式：
    直接按 design 中确认的结构创建。

    constitution.yaml 格式：
    ```yaml
    dimension: <dimension>
    description: <维度说明>
    items:
      - tech_stack: []              # 空 = 通用规则
        status: active
        summary: <规范摘要>
        file: universal.md

      - tech_stack: [<tech>]
        status: active
        summary: <规范摘要>
        file: <tech>.md
    ```

    **3.3 创建参考文件**

    对 constitution.yaml 中每个 items 条目，创建对应的 .md 文件，写入规则内容。

    ```bash
    # 创建 universal.md（通用规范）
    cat > docs/constitution/<dimension>/universal.md << 'EOF'
    ...

    # 创建 tech-specific 文件（如 python.md）
    cat > docs/constitution/<dimension>/python.md << 'EOF'
    ...
    ```

    **3.4 更新 AGENTS.md（仅根目录）**

    只修改项目根目录的 `AGENTS.md`。子目录的 AGENTS.md 不维护宪法内容。

    委托 category="write" 处理：

    task(category="write", load_skills=[], run_in_background=false,
        prompt="更新 AGENTS.md 的 Constitution 区域。

        需要追加的维度：<dimension>
        格式模板（参考 schemas/constitution/templates/section.md）：
        - **<dimension>** → `docs/constitution/<dimension>/`

        操作：
        1. 读取根目录的 AGENTS.md
        2. 找到 `<!-- constitution-start -->` 和 `<!-- constitution-end -->` 之间的内容
        3. APPEND 模式：在现有条目后追加新维度（保留已有条目）
        4. INIT 模式：创建全新的 ## Constitution 区域（含 constitution-start/end 标记）
        5. 写回 AGENTS.md

        不要修改 Constitution 区域之外的任何内容。不要修改子目录的 AGENTS.md。")

    === Step 4：自检 ===

    ```bash
    # 1. constitution.yaml 存在且格式正确
    test -f docs/constitution/<dimension>/constitution.yaml && echo "constitution.yaml exists"

    # 2. 所有 .md 文件存在
    ls docs/constitution/<dimension>/*.md

    # 3. 根目录 AGENTS.md 包含新维度条目
    grep -q '<dimension>' AGENTS.md && echo "AGENTS.md updated"
    ```

    如果任何检查失败，警告用户并提供修复选项。

    === Step 5：报告结果 ===

    向用户展示：
    - 创建了哪些文件
    - AGENTS.md 更新内容
    - 验证结果

    如果失败，提供修复命令。
