name: spec-driven
version: 1
description: Default OpenSpec workflow - proposal → specs → design → tasks
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      __LANG_PLACEHOLDER__

      **SCOPE RESTRICTION: Do NOT modify any source code. Only generate proposal.md.**

      Create the proposal document that establishes WHY this change is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
      this solve? Why now?

      - **What Changes**: Bullet list of changes. Be specific about new
      capabilities, modifications, or removals. Mark breaking changes with
      **BREAKING**.

      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<capability>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.


      IMPORTANT: The Capabilities section is critical. It creates the contract
      between proposal and specs phases. Research existing specs before filling
      this in.

      Each capability listed here will need a corresponding spec file.


      Keep it concise (1-2 pages). Focus on the "why" not the "how" -
      implementation details belong in design.md.


      This is the foundation - specs, design, and tasks all build on this.
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: >
      __LANG_PLACEHOLDER__

      **SCOPE RESTRICTION: Do NOT modify any source code. Only generate spec files.**

      **VALIDATION RULES (MUST follow — `openspec validate` enforces these):**

      1. Each requirement MUST start with `### Requirement: <name>`

      2. **Requirement description MUST contain uppercase MUST or SHALL.**
         Do NOT use Chinese "必须" — it fails validation.
         - Affirmative: "The system MUST ..."
         - Negative: "The system MUST NOT ..."

      3. Each requirement MUST have at least one scenario.

      4. Each scenario MUST start with `#### Scenario: <name>` — exactly 4 `#`.
         Using 3 `#` or bullet points fails silently.

      5. Each scenario body MUST contain WHEN / THEN keywords.

      After writing ALL spec files, run:
      `openspec validate <change-name>`
      Fix any ERROR before proceeding.


      Create specification files that define WHAT the system should do.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      If the proposal lists no capabilities (both New and Modified sections are
      empty), skip spec file generation. Create an empty `specs/` directory and
      proceed to the next artifact.

      - New capabilities: use the exact kebab-case name from the proposal
      (specs/<capability>/spec.md).

      - Modified capabilities: use the existing spec folder name from
      openspec/specs/<capability> when creating the delta spec at
      specs/<capability>/spec.md.


      Delta operations (use ## headers):

      - **ADDED Requirements**: New capabilities

      - **MODIFIED Requirements**: Changed behavior - MUST include full updated
      content

      - **REMOVED Requirements**: Deprecated features - MUST include **Reason**
      and **Migration**

      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format


      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description

      - Use SHALL/MUST for normative requirements (avoid should/may)

      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format

      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3
      hashtags or bullets will fail silently.

      - Every requirement MUST have at least one scenario.


      MODIFIED requirements workflow:

      1. Locate the existing requirement in openspec/specs/<capability>/spec.md

      2. Copy the ENTIRE requirement block (from `### Requirement:` through all
      scenarios)

      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior

      4. Ensure header text matches exactly (whitespace-insensitive)


      Common pitfall: Using MODIFIED with partial content loses detail at
      archive time.

      If adding new concerns without changing existing behavior, use ADDED
      instead.


      Example:

      ```

      ## ADDED Requirements


      ### Requirement: User can export data

      The system SHALL allow users to export their data in CSV format.


      #### Scenario: Successful export

      - **WHEN** user clicks "Export" button

      - **THEN** system downloads a CSV file with all user data


      ## REMOVED Requirements


      ### Requirement: Legacy export

      **Reason**: Replaced by new export system

      **Migration**: Use new export endpoint at /api/v2/export

      ```


      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      __LANG_PLACEHOLDER__

      **SCOPE RESTRICTION: Do NOT modify any source code. Only generate design.md.**

      Create the design document that explains HOW to implement the change.


      Always create design.md with at least Context and Decisions sections.
      Expand to include Migration Plan and Open Questions when needed.

      Sections:

      - **Context**: Background, current state, constraints, stakeholders

      - **Goals / Non-Goals**: What this design achieves and explicitly excludes

      - **Decisions**: Key technical choices with rationale (why X over Y?).
      Include alternatives considered for each decision.

      - **Risks / Trade-offs**: Known limitations, things that could go wrong.
      Format: [Risk] → Mitigation

      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)

      - **Open Questions**: Outstanding decisions or unknowns to resolve


      Focus on architecture and approach, not line-by-line implementation.

      Reference the proposal for motivation and specs for requirements.


      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      __LANG_PLACEHOLDER__

      **SCOPE RESTRICTION: Do NOT modify any source code. Only generate tasks.md and the plan file.**

      Create the task list (tasks.md) and generate the OMO-compatible plan file
      (.sisyphus/plans/<change-name>.md).


      **You MUST create TWO files:**

      1. **tasks.md** — Standard checkbox task list at
      `openspec/changes/<change-name>/tasks.md`

      2. **.sisyphus/plans/<change-name>.md** — Aggregated plan document at
      project root


      === PHASE 1: Understand the OpenSpec Context ===


      **Step 0: Read and Understand All OpenSpec Artifacts**

      Read every artifact file. Each has a specific role and format. Understand
      their content before generating anything.


      Artifact overview (template = format definition, product = actual content):

      | File | Role | Template (format) | Product (content) |
      |------|------|-------------------|-------------------|
      | `proposal.md` | WHY — why this change, what capabilities | `schemas/spec-driven/templates/proposal.md` | `openspec/changes/<change-name>/proposal.md` |
      | `specs/<capability>/spec.md` | WHAT — requirements, acceptance scenarios | `schemas/spec-driven/templates/spec.md` | `openspec/changes/<change-name>/specs/*/spec.md` |
      | `design.md` | HOW — technical approach, decisions, risks | `schemas/spec-driven/templates/design.md` | `openspec/changes/<change-name>/design.md` |
      | `tasks.md` | DO — checkbox task list | `schemas/spec-driven/templates/tasks.md` | `openspec/changes/<change-name>/tasks.md` |


      How to use each artifact when generating the plan:

      - **proposal.md** → extract Why for TL;DR, background for Context,
      Capabilities list for Work Objectives

      - **specs/<capability>/spec.md** → extract Requirements for Work Objectives,
      Scenarios (WHEN/THEN) for Verification Strategy.
      Each spec has fixed section anchors you can reference:
      `#added-requirements`, `#modified-requirements`, `#removed-requirements`

      - **design.md** (if exists) → extract Goals, Decisions, Risks for
      Execution Strategy.

      - **tasks.md** → copy checkbox list directly into ## Tasks. This is the
      only section where content is copied, not referenced.


      **Step 1: Quality Review of OpenSpec Artifacts (Last Quality Gate)**

      Before generating anything, review all artifacts for quality issues:

      1. **Coverage**: Does every proposal Capability have a corresponding spec?
      2. **Verifiability**: Does every spec Requirement have at least one Scenario?
      3. **Consistency**: Do proposal, specs, design, and tasks agree with each
      other? No contradictions?
      4. **Completeness**: Do the tasks cover all specs' Requirements?
      5. **Clarity**: Are there ambiguous statements that could be interpreted
      multiple ways?

      → If ANY issue found: STOP. List specific problems. Wait for user
      confirmation before proceeding.

      → If all clean: Proceed.


      **Step 2: Invoke Metis for Gap Analysis (MANDATORY)**

      Before writing the plan, invoke Metis with the artifacts context.
      If task() fails (e.g. agent unavailable), proceed without Metis
      and note the gap analysis was skipped.

      ```
      task(subagent_type="metis", prompt="我准备为此变更生成 OMO plan。
       已完成的产物:
       - proposal.md: [2-3句摘要]
       - specs: [列出每个capability名称+核心requirement]
       - design.md: [存在/不存在，如果存在简述决策]
       - 计划草案: [简述主要任务分组和Wave划分]

       请对计划草案做gap analysis，识别：
       1. 遗漏的需求或意图
       2. 表达模糊的地方
       3. scope creep / AI-slop
       4. 缺失的验收标准
       5. 未覆盖的边界情况")
      ```

      Apply Metis's findings:
      - 🔴 Blocking issues → Fix them, re-invoke Metis
      - 🟡 Suggestions → Address if feasible
      - ✅ Confirmed → Proceed


      === PHASE 2: Generate tasks.md ===


      Write to `openspec/changes/<change-name>/tasks.md`.

      Use `## Tasks` as section header, `### Wave N: Group Name` for
      sub-groupings. Each task MUST start with `- [ ] N.M Description`.
      tasks.md keeps this simple format. The rich sub-fields go in the plan
      file only (see PHASE 3).


      === PHASE 3: Generate Plan File ===


      This is the OMO plan file. Write to project-root-level
      `.sisyphus/plans/<change-name>.md`.

      Structure with 9 sections. For each section, WRITE A BRIEF SUMMARY then
      APPEND OpenSpec document links with anchored references. Do NOT copy
      artifact content verbatim (except TODOs).


      ⚠️ Before writing, check if `.sisyphus/plans/<change-name>.md` already
      exists. If it does, ask the user: "Plan file exists. Overwrite (will lose
      existing progress) or append new tasks?" Do NOT overwrite without
      confirmation.


      **Section 1: ## TL;DR**

      1-2 sentence summary extracted from proposal.md (the Why and core change).

      Append:

      > See [proposal.md](openspec/changes/<change-name>/proposal.md)


      **Section 2: ## Context**

      2-3 sentence background from proposal.md.

      Append:

      > See [proposal.md](openspec/changes/<change-name>/proposal.md)


      **Section 3: ## Work Objectives**

      List each capability name from specs/. For each, note the key
      requirement. Do NOT copy full requirement text.

      Append per capability:

        > See [spec.md#added-requirements](openspec/changes/<change-name>/specs/<capability>/spec.md)


      **Section 4: ## Verification Strategy**

      Reference specs scenarios. Do NOT copy scenario text.

      Append:

      > See [specs](openspec/changes/<change-name>/specs/)


      **Section 5: ## Execution Strategy**

      If design.md exists: reference it and note key decisions.

      > See [design.md](openspec/changes/<change-name>/design.md)


      **Section 6: ## Tasks**

      Start with the checkbox list from tasks.md and expand each task with the
      following sub-fields. This section is parsed by `/start-work` for task
      tracking.

      Each task MUST include these sub-fields (expand the simple checkbox into
      this format):

      ```
      ### Wave N: Group Name

      - [ ] N.M Task title
        **What to do**:
        - Implementation step 1
        - Implementation step 2

        **Must NOT do**:
        - Things to avoid

        **Recommended Agent Profile**: category="[category]", load_skills=["[skill]"]

        **References**:
        - Pattern: [file:line](path)
        - API: [file:line](path)

        **Acceptance Criteria**:
        `[executable command to verify]`

        **QA Scenarios**:
        Scenario: [name]
          Preconditions: [setup]
          Steps: [actions]
          Expected: [result]
          Evidence: .sisyphus/evidence/task-N.M-[slug].[ext]

        > See OpenSpec context: [spec.md#added-requirements](openspec/changes/<change-name>/specs/<capability>/spec.md)
      ```

      CRITICAL: Each task's last line MUST append its OpenSpec source reference
      so the executing AI can trace back to the original requirement.


      **Section 7: ## Final Verification Wave**

      ```
      - [ ] F1. **Plan Compliance Audit** — oracle
        Verify all tasks match OpenSpec requirements. Check scope boundaries.
        Output: "Must Have [N/N] | Scope [OK/LEAK] | VERDICT"

      - [ ] F2. **Code Quality Review** — unspecified-high
        Run typecheck, linter, tests. Output: "Build | Lint | Tests | VERDICT"

      - [ ] F3. **Real Manual QA** — unspecified-high
        Execute QA scenarios from each task. Output: "Scenarios [N/N] | VERDICT"

      - [ ] F4. **Scope Fidelity Check** — deep
        Compare implementation diff against specs. No extra, no missing.
        Output: "Tasks [N/N] | Clean | VERDICT"
      ```


      **Section 8: ## Commit Strategy**

      Map tasks to files and commit messages:

      ```
      - Task N.M → [file] → `type(scope): description`
      ```


      **Section 9: ## Success Criteria**

      Final verification checklist. Append OpenSpec specs reference for each
      capability:

      ```
      - [ ] All acceptance criteria pass
      - [ ] All QA scenarios pass
      - [ ] Scope is clean (no extra, no missing)

      For each capability:
      > See [spec.md#added-requirements](openspec/changes/<change-name>/specs/<capability>/spec.md)
      ```


      <!-- Progress Tracking (Meta: sync protocol for task states) -->

      ```
      - tasks.md (`openspec/changes/<change-name>/tasks.md`) is the single source of
        truth for checkbox states
      - When updating a checkbox in tasks.md, immediately mirror the change in
        this plan's ## Tasks section
      - On pause or all_done: sync checkbox states from tasks.md to this plan
        and update .sisyphus/boulder.json
      - Do NOT use todowrite/todoread — this plan file is the tracking source
      ```


      === PHASE 4: Validate and Finalize ===


      **Last Step: Invoke Momus for Review (OPTIONAL)**

      If you want Momus to validate the final plan, invoke it.
      It returns OKAY or REJECT with specific issues.
      If REJECT: fix ALL issues, re-invoke Momus.
      Loop until OKAY or you decide to stop.

      **Step: Plan Structure Validation (MANDATORY)**

      After writing both files, validate the plan structure before finishing:

      1. `grep -c '^## ' .sisyphus/plans/<change-name>.md` → must be at least 8
      2. `grep -q '## Tasks' .sisyphus/plans/<change-name>.md` → Tasks section exists
      3. `grep -q '## Final Verification Wave' .sisyphus/plans/<change-name>.md` → FVW exists
      4. Verify task coverage: count checkboxes in Tasks section only.
         `sed -n '/^## Tasks/,/^## /p' .sisyphus/plans/<change-name>.md | grep -c '^- \['`
         should equal `grep -c '^- \[' tasks.md`

      If ANY check fails: STOP, fix the plan, re-validate.
      Do NOT proceed until all checks pass.

      === SUMMARY CHECKLIST ===

      Before finishing, confirm:
      - [ ] tasks.md exists with proper ## Tasks + ### Wave format
      - [ ] .sisyphus/plans/<change-name>.md exists with all 9 sections
      - [ ] Each plan section appends OpenSpec references with anchors
      - [ ] Each task in Tasks has What to do, Must NOT do, Agent Profile,
            References, Acceptance Criteria, QA Scenarios, Evidence, and
            OpenSpec source reference
      - [ ] Progress Tracking section included
      - [ ] Final Verification Wave included
    requires:
      - specs
      - design
  - id: critic
    generates: critic.md
    description: Multi-agent plan review checking spec compliance, plan quality, edge cases, and risks
    template: critic.md
    instruction: |
      __LANG_PLACEHOLDER__

      **SCOPE RESTRICTION: Do NOT modify any source code. Only generate critic.md.**

      Review the plan and artifacts against spec requirements.

      === PHASE 1: Read Context ===

      Read these files:
      - `.sisyphus/plans/<change-name>.md` — the plan to review
      - `openspec/changes/<change-name>/tasks.md` — checkbox task list
      - `openspec/changes/<change-name>/specs/` — all spec files
      - `openspec/changes/<change-name>/design.md` — technical design
      - `openspec/changes/<change-name>/proposal.md` — proposal

      === PHASE 2: Launch 5 Parallel Reviews ===

      Launch 5 Momus agents IN PARALLEL with the same comprehensive review
      prompt. Each runs independently — aggregate and deduplicate results.

      ```
      REVIEW_PROMPT = "你正在对一个 OpenSpec change 生成的 plan 进行全面审查。
      请审查以下所有维度，按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

      审查文件：
      - plan: .sisyphus/plans/<change-name>.md
      - specs: openspec/changes/<change-name>/specs/
      - design: openspec/changes/<change-name>/design.md（如果存在）
      - tasks: openspec/changes/<change-name>/tasks.md

      请逐一检查以下 5 个维度：

      维度 1 — Spec Compliance：
      逐条对比每个 spec requirement 在 plan 中是否有对应 task。
      报告遗漏和 scope leak。用表格展示。

      维度 2 — Plan Quality：
      逐 task 检查子字段完整性：What to do、MUST NOT do、Agent Profile、
      Acceptance Criteria、QA Scenarios。对每个字段标 ✅/❌。

      维度 3 — Edge Cases & Risks：
      scope 边界、遗漏场景、风险缓解措施、未声明的依赖、验收完整性。

      维度 4 — Execution Feasibility：
      任务之间是否有依赖冲突？验收标准是否真的可执行？有无歧义？

      维度 5 — Design Alignment：
      plan 是否充分体现了 design 的决策和风险缓解措施。
      spec 中的 scenarios 是否都在 plan 中有对应的验收步骤。"

      task1 = task(subagent_type="momus", run_in_background=true, prompt=REVIEW_PROMPT)
      task2 = task(subagent_type="momus", run_in_background=true, prompt=REVIEW_PROMPT)
      task3 = task(subagent_type="momus", run_in_background=true, prompt=REVIEW_PROMPT)
      task4 = task(subagent_type="momus", run_in_background=true, prompt=REVIEW_PROMPT)
      task5 = task(subagent_type="momus", run_in_background=true, prompt=REVIEW_PROMPT)
      ```

      === PHASE 3: Aggregate Results ===

      Collect all 5 results:
      ```
      r1 = background_output(task_id=task1)
      r2 = background_output(task_id=task2)
      r3 = background_output(task_id=task3)
      r4 = background_output(task_id=task4)
      r5 = background_output(task_id=task5)
      ```

      Deduplicate and merge findings. Classify by severity:
      - 🔴 BLOCKER: Must fix before apply
      - 🟡 WARNING: Should address
      - ⚪ INFO: Suggestion

      === PHASE 4: Generate critic.md ===

      Write the review to `openspec/changes/<change-name>/critic.md` using the
      template format.

      Determine VERDICT:
      - If any 🔴 → **🔴 BLOCKED**
      - If only 🟡/⚪ (no 🔴) → **⚠️ CONDITIONAL**
      - If no issues → **✅ PASS**

      === PHASE 5: Blocking Decision ===

      - If BLOCKED: Print "🛑 Critic BLOCKED. Fix 🔴 issues above, then re-run critic." Do NOT allow apply.
      - If CONDITIONAL: Print message listing 🟡 items. User can acknowledge risks or fix.
      - If PASS: Print "✅ All checks passed. Proceed to apply."
    requires:
      - tasks
apply:
  requires:
    - critic
  tracks: tasks.md
  instruction: |
    __LANG_PLACEHOLDER__

    Implement tasks from the change's task list.

    === STEP 1: Load Context ===

    Read these context files:
    - `openspec/changes/<change-name>/proposal.md` — why the change exists
    - `openspec/changes/<change-name>/specs/` — what to build (requirements + scenarios)
    - `openspec/changes/<change-name>/design.md` — technical approach
    - `openspec/changes/<change-name>/tasks.md` — task list with checkboxes
    - `openspec/changes/<change-name>/critic.md` — critic review results

    Also read the plan file at `.sisyphus/plans/<change-name>.md` for
    execution strategy and task details.

    **CRITIC VERDICT CHECK**

    Before executing any task, read `openspec/changes/<change-name>/critic.md`
    and check the VERDICT:

    1. Read the first section `## Verdict` and find `**VERDICT**: ...`
    2. If `🔴 BLOCKED`: STOP. Print "🛑 Critic BLOCKED this change. Fix issues and re-run critic." Do NOT execute any tasks.
    3. If `⚠️ CONDITIONAL`: List the 🟡 items. Ask user to confirm before proceeding.
    4. If `✅ PASS`: Continue normally.

    === STEP 2: Execute Tasks ===

    Work through pending tasks one at a time (dependency order first).

    For each task:
    1. Read the task's **What to do** and **References** for implementation guidance
    2. **Must NOT do**: Respect the task's exclusion list
    3. Make minimal, focused changes
    4. Run the task's **Acceptance Criteria** command to verify
    5. Run the task's **QA Scenarios** to validate

    On task completion:
    - Mark `- [ ]` → `- [x]` in tasks.md
    - EAGER SYNC: Immediately update the same checkbox in
      .sisyphus/plans/<change-name>.md

    On task failure (criteria not met):
    - Diagnose the failure, fix the issue, re-test
    - If stuck after 3 attempts: note in plan, move to next task

    === STEP 3: State Sync ===

    **Task State Sync Protocol**:
    - tasks.md is the single source of truth for checkbox states
    - EAGER SYNC: When you change a checkbox in tasks.md, immediately update
      the same checkbox in .sisyphus/plans/<change-name>.md
    - ON PAUSE: Before pausing, verify both files have identical checkbox
      states. Run: diff <(grep '^- \[' tasks.md) <(sed -n '/^## Tasks/,/^## /p' .sisyphus/plans/<change-name>.md | grep '^- \[')
    - ON ALL_DONE: Same verification as pause. All checkboxes should be [x].
      Also create/update .sisyphus/evidence/ directory for any evidence files.

    Pause if you hit blockers or need clarification.
