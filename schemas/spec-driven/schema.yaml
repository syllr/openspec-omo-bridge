name: spec-driven
version: 1
description: Default OpenSpec workflow - proposal → specs → design → tasks → critic → apply
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 proposal.md。**

      === PHASE 1：上下文提取 ===

      在编写 proposal 之前，系统性地回顾当前对话，提取所有与本变更相关的信息。

      **如果对话超过 30 条消息（用户 + AI 的交流）：**
      1. 将对话分为三段：前期、中期、后期
      2. 从每段中分别提取关键点（每段 3-8 条）
      3. 合并所有段落的要点，去重并综合
      4. 特别注意中期段落中出现但后续未被重提的点
      5. 标记在任何段落中发现的不确定信号

      **对于较短的对话：** 直接从完整对话中提取。

      将发现组织为 6 个类别：

      1. **核心动机**：什么驱动了这次讨论？用户的明确痛点是什么？
      2. **变更范围**：讨论到的每个具体能力、修改或移除项，包括提到的技术约束
      3. **显式约束**：用户明确的边界——"必须用 X"、"不能用 Y"、兼容性要求
      4. **显式非目标**：用户明确说不在范围内的事项
      5. **不确定信号**：用户说"需要调研"、"不确定"、"可能需要研究"的点，
         每个标记为 `[NEEDS INVESTIGATION]`
      6. **影响系统**：用户提到的代码、API、依赖、团队

      **这是思考步骤——不写入文件。**

      === PHASE 2：生成 ===

      读取模板文件 `schemas/spec-driven/templates/proposal.md`，了解确切的输出结构。

      在 `openspec/changes/<change-name>/proposal.md` 创建提案文档。

      按模板结构编写全部 4 个部分：
      - **Why**（动机）：1-2 句话说明问题或机会
      - **What Changes**（变更内容）：具体的变更项列表，不兼容变更标记 **BREAKING**
      - **Capabilities**（能力清单）：
        - New Capabilities（新能力）：kebab-case 命名，每个对应一个 spec 文件
        - Modified Capabilities（修改的能力）：检查 `openspec/specs/` 中已有的名称
      - **Impact**（影响）：受影响的代码、API、依赖、系统

      **完整性优先**——覆盖 PHASE 1 中的所有要点。保持语言简洁，但不以覆盖度为代价。

      提案应让技术和非技术读者都能理解。

      编写后验证输出是否完全遵循模板结构。

      === PHASE 3：自检 ===

      在最终确定前，对照以下清单自查：
      □ PHASE 1 中的所有动机点是否反映在 Why 部分？
      □ 每个讨论到的变更项是否在 What Changes 中体现？
      □ 用户提到的约束和非目标是否已记录？
      □ 不确定信号是否已用 `[NEEDS INVESTIGATION]` 标记？
      □ Capabilities 是否使用正确的 kebab-case 命名并覆盖所有讨论范围？
      □ 生成的 proposal 是否遵循模板结构（正确的标题层级）？

      如果有任何检查不通过，修改后再继续。

      === PHASE 4：Oracle + Metis 并行审查（强制） ===

      同时启动 1 个 Oracle + 1 个 Metis agent 审查生成的 proposal。
      调用前将占位符替换为实际内容。

      **Oracle prompt：**
      task(subagent_type="oracle", run_in_background=false, prompt="
      你正在审查一个 OpenSpec 变更提案的完整性。

      PHASE 1 的上下文提取结果：
      [将 PHASE 1 的提取输出粘贴此处，替换本行]

      生成的 proposal.md 内容：
      [将 openspec/changes/<change-name>/proposal.md 全文粘贴此处，替换本行]

      检查：
      1. 遗漏项——PHASE 1 的要点未在 proposal 中体现
      2. 范围蔓延——proposal 中出现了对话中未讨论的内容
      3. 模糊性——用户有明确约束的地方使用了模糊语言
      4. 不确定信号——是否正确标记了 [NEEDS INVESTIGATION]

      严重程度：🔴 遗漏关键项 / 🟡 轻微遗漏 / ⚪ 建议

      输出格式：
      - 按严重程度列出发现
      - 对每个 🔴/🟡，给出具体的修改建议
      ")

      **Metis prompt：**
      task(subagent_type="metis", run_in_background=false, prompt="
      你正在审查一个 OpenSpec 变更提案的结构和质量。

      生成的 proposal.md 内容：
      [将 openspec/changes/<change-name>/proposal.md 全文粘贴此处，替换本行]

      检查：
      1. 结构——所有必需的部分是否都存在且格式正确
      2. Capabilities 命名——kebab-case，与已有 specs 兼容
      3. 范围边界——What Changes / Capabilities / Impact 没有混淆
      4. 可操作性——proposal 足够具体，可以从中衍生 specs

      严重程度：🔴 结构问题 / 🟡 小问题 / ⚪ 建议

      输出格式：
      - 按严重程度列出发现
      - 对每个 🔴/🟡，给出具体的修改建议
      ")

      **收集评审结果：**
      1. 读取 Oracle 输出 → 列出所有 🔴/🟡/⚪ 发现
      2. 读取 Metis 输出 → 列出所有 🔴/🟡/⚪ 发现
      3. **自检**：确认两个 agent 的结果都已成功读取。如有遗漏，回到步骤 1 重新读取
      4. 合并发现：同一问题多个 agent 都发现时取更高严重程度
      5. 分类判定：
         - 有任何 🔴 → BLOCKED，修复 proposal.md 后重新运行 PHASE 4（最多 3 轮）
         - 仅 🟡/⚪ → 评估后决定是否修复，然后继续

      **Fast fail：** 如果任一 agent 调用失败（超时、不可用、出错）：
      - 立即停止工作流
      - 向用户报告：「❌ proposal 审查中断：[agent name] 调用失败。[error message]」
      - 不得降级，不得自行修复，不得跳过审查
      - 等待用户介入

      === PHASE 5：格式完整性检查 ===

      所有审查通过后，扫描生成的 proposal.md 中是否存在：
      - 空部分（有标题但无内容）
      - 未替换的占位符（如 `<name>`、`<description>`）
      - `[TODO]` 或 `[TBD]` 标记

      如果发现：直接修复（仅格式修改，无需重新审查）。

      === PHASE 6：循环与继续 ===

      - 如果在 PHASE 4 中发现 🔴：修复 proposal.md，从 PHASE 4 重新运行
      - 最多 3 轮。3 轮后仍有 🔴：将剩余问题展示给用户
      - 全部清除：proposal 完成，进入下一个 artifact
    requires: []
  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 spec 文件。**

      **VALIDATION RULES (MUST follow — `openspec validate` enforces these):**

      1. Each requirement MUST start with `### Requirement: <name>`

      2. **Requirement description MUST contain uppercase MUST or SHALL.**
         Do NOT use Chinese "必须" — it fails validation.
         - Affirmative: "The system MUST ..."
         - Negative: "The system MUST NOT ..."

      3. Each requirement MUST have at least one scenario.

      4. Each scenario MUST start with `#### Scenario: <name>` — exactly 4 `#`.
         Using 3 `#` or bullet points fails silently.

      5. Each scenario body MUST contain WHEN / THEN keywords.

      After writing ALL spec files, run:
      `openspec validate <change-name>`
      Fix any ERROR before proceeding.


      Create specification files that define WHAT the system should do.


      Create one spec file per capability listed in the proposal's Capabilities
      section.

      If the proposal lists no capabilities (both New and Modified sections are
      empty), skip spec file generation. Create an empty `specs/` directory and
      proceed to the next artifact.

      - New capabilities: use the exact kebab-case name from the proposal
      (specs/<capability>/spec.md).

      - Modified capabilities: use the existing spec folder name from
      openspec/specs/<capability> when creating the delta spec at
      specs/<capability>/spec.md.


      Delta operations (use ## headers):

      - **ADDED Requirements**: New capabilities

      - **MODIFIED Requirements**: Changed behavior - MUST include full updated
      content

      - **REMOVED Requirements**: Deprecated features - MUST include **Reason**
      and **Migration**

      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format


      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description

      - Use SHALL/MUST for normative requirements (avoid should/may)

      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format

      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3
      hashtags or bullets will fail silently.

      - Every requirement MUST have at least one scenario.


      MODIFIED requirements workflow:

      1. Locate the existing requirement in openspec/specs/<capability>/spec.md

      2. Copy the ENTIRE requirement block (from `### Requirement:` through all
      scenarios)

      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior

      4. Ensure header text matches exactly (whitespace-insensitive)


      Common pitfall: Using MODIFIED with partial content loses detail at
      archive time.

      If adding new concerns without changing existing behavior, use ADDED
      instead.


      Example:

      ```

      ## ADDED Requirements


      ### Requirement: User can export data

      The system SHALL allow users to export their data in CSV format.


      #### Scenario: Successful export

      - **WHEN** user clicks "Export" button

      - **THEN** system downloads a CSV file with all user data


      ## REMOVED Requirements


      ### Requirement: Legacy export

      **Reason**: Replaced by new export system

      **Migration**: Use new export endpoint at /api/v2/export

      ```


      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 design.md。**

      === PHASE 1：读取输入 ===

      Read the following files and extract key information for the design:
      - `openspec/changes/<change-name>/proposal.md` — WHY and capabilities
      - `openspec/changes/<change-name>/specs/` — WHAT, requirements and scenarios
      - `openspec/changes/<change-name>/research/` — technical research findings (if exists)

      === PHASE 2：通过 Deep Agent 生成 ===

      Package all extracted context, requirements, and research findings into a
      comprehensive prompt. Then delegate generation to a focused agent:

      task(category="deep", load_skills=[], run_in_background=false,
           prompt="Generate a technical design document (design.md) for the following change.

           Input context:
           - Proposal (动机和变更范围): [将 proposal.md 的核心内容填入此处]
           - Spec requirements (关键需求): [将各 spec 的 requirement 和 scenario 填入此处]
           - Research findings (调研结论): [将 research/ 中的关键发现填入此处，如果没有则填"无"]

           The design document MUST include these sections:

           1. **Context**: Background, current state, constraints, stakeholders
           2. **Goals / Non-Goals**: What this design achieves and explicitly excludes
           3. **Decisions**: Key technical choices with rationale (why X over Y?).
              Include alternatives considered for each decision.
           4. **Risks / Trade-offs**: Known limitations, things that could go wrong.
              Format: [Risk] → Mitigation
           5. **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
           6. **Open Questions**: Outstanding decisions or unknowns to resolve

           Key requirements:
           - Focus on architecture and approach, not line-by-line implementation
           - Each design decision must map to at least one spec requirement
           - The chosen approach must address the relevant requirement's scenario
           - If research findings exist, reference them with `详见 research/<topic>/notes.md`
           - Explain the 'why' behind each technical decision
           - Keep it focused and actionable")

      After deep agent returns, verify the generated design.md covers all
      required sections at `openspec/changes/<change-name>/design.md`.
      If any section is missing, fix directly (minor edits only).


      === Technical Research (Optional) ===

      When reading the proposal, watch out for **uncertainty signals** such as:

      - Words like "可能", "maybe", "might", "needs investigation"
      - References to undocumented APIs or protocols
      - Questions about API fields, signatures, or authentication methods
      - Unclear library behavior or compatibility concerns

      对于每个这样的不确定点，按以下流程处理：

       1. **Identify research topics**: Extract each uncertain point from proposal.md
          into a named research topic (kebab-case). Example: `api-signature-format`, `plugin-config-schema`.

       2. **Two-Wave Concurrent Research**:

          All research artifacts (scripts, docs, API responses) are saved to the temporary
          directory `$project/spectest/<topic>/`. After user confirmation, they are moved to
          `openspec/changes/<change-name>/research/<topic>/`.

          **Wave 1 — All librarians concurrently**: Fire ALL topics' librarian tasks in ONE
          message. Each librarian researches documentation or source code for its topic.

          ```
          task(subagent_type="librarian", run_in_background=false, prompt="调研 plugin.xml 配置声明格式...")
          task(subagent_type="librarian", run_in_background=false, prompt="调研 OAuth2 PKCE 流程...")
          # ...N 个 topic，全部并发
          ```

          Wait for ALL librarians to complete. Save each result to `spectest/<topic>/notes.md`.

          **Wave 2 — All Sisyphus-Junior (deep) concurrently**: After all librarians are done,
          fire ALL topics' analysis tasks in ONE message. Each deep agent reads the librarian's
          findings and writes validation scripts with real API/interface calls.

          ```
          task(category="deep", load_skills=[], run_in_background=false, prompt="基于 spectest/plugin-config/notes.md 的调研结果，
          写一个脚本来实际测试 plugin.xml 配置声明格式。调用真实接口验证签名方式，
          给出完整的代码示例和调用方式。将脚本和结果保存到 spectest/plugin-config/。")
          task(category="deep", load_skills=[], run_in_background=false, prompt="基于 spectest/pkce-flow/notes.md 的调研结果，
          写一个脚本来验证 PKCE code_challenge 生成流程...")
          # ...N 个 topic，全部并发
          ```

          Wait for ALL deep agents to complete. Save each result to `spectest/<topic>/`.

       3. **User confirmation**: Present a summary of all research findings to the user.
          After user confirms, move each `spectest/<topic>/` directory to
          `openspec/changes/<change-name>/research/<topic>/`.

          Final structure after confirmation:

          ```
          openspec/changes/<change-name>/research/
          ├── index.md                    ← 所有调研点的摘要 + 最终结论
          ├── <topic-1>/                  ← 每个调研点一个子目录
          │   ├── notes.md               ← 调研笔记（文档摘录、分析）
          │   ├── test-script.sh/py/js   ← 验证脚本（可执行）
          │   └── results.json           ← 实际返回结果（接口响应等）
          └── <topic-2>/
              ├── notes.md
              └── ...
          ```

       4. **Update design.md**: Reference research findings in the relevant Decisions
          sections. Use links like `详见 research/<topic>/notes.md`.

       **Important**:
       - research/ 目录是**可选的** — 只有 proposal 中存在不确定点时才创建
       - research/ 是工作过程产物（side effect），不被 OpenSpec generations 跟踪
       - 验证脚本必须是**实际可运行的**（不是伪代码）
       - spectest/ 是临时目录，用户确认后数据会被移到 research/
       - 如果调研结果影响了设计方案，在 design.md 的 Decisions 中明确记录
    requires:
      - proposal
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 tasks.md。**

      Create the task list (tasks.md).


      **You MUST create ONE file:**

      `openspec/changes/<change-name>/tasks.md` — Standard checkbox task list


      === PHASE 1：理解上下文 ===


      **Step 0: Read and Understand All OpenSpec Artifacts**

      Read every artifact file. Each has a specific role:

      | File | Role |
      |------|------|
      | `proposal.md` | WHY — why this change, what capabilities |
      | `specs/<capability>/spec.md` | WHAT — requirements, acceptance scenarios |
      | `design.md` | HOW — technical approach, decisions, risks |
      | `tasks.md` | DO — checkbox task list |


      How to use each artifact:
      - **proposal.md** → list Capabilities to determine task groupings
      - **specs/<capability>/spec.md** → extract Requirements to define task scope
      - **design.md** → extract Decisions to plan execution approach


      **Step 1: Quick Artifact Review**

      Before generating, quickly check:
      1. Does every proposal Capability have a corresponding spec?
      2. Do the tasks cover all specs' key Requirements?
      3. Any contradictions?
      → If issues found: STOP, list specifics, wait for user.
      → If all clean: Proceed.


      **Step 2: Invoke Oracle for Gap Analysis (MANDATORY)**

      Invoke Oracle before writing tasks.md. Oracle 会按信源优先级分析冲突并给出修复建议。
      在调用 Oracle 前，先读取所有 artifacts，然后在 prompt 中附上关键内容的原文（而非仅摘要），确保 Oracle 有足够上下文做出准确判断。

      **Fast fail 保护**: 如果 Oracle task() 调用失败（超时、不可用、出错），立即停止工作流（**fast fail，不得降级**）：
      - 向用户报告：「❌ 差距分析中断：Oracle 调用失败。[错误信息]」
      - 不得自行分析 gap，不得自行生成 tasks.md
      - 等待用户介入

      task(subagent_type="oracle", run_in_background=false, prompt="我准备为此变更生成 tasks.md（任务清单）。

      已完成的产物原文（关键段落）：

      - **proposal.md** 核心变更陈述: [引用原文 2-3 句]
      - **各 spec 的关键 requirement 原文**:
        - <capability-1>: 「### Requirement: <名称>
          <完整描述，须含 MUST/SHALL>」
          Scenario 示例: 「#### Scenario: <名称>  WHEN ... THEN ...」
        - <capability-2>: 「### Requirement: <名称>
          <完整描述，须含 MUST/SHALL>」
      - **design.md** 关键决策原文（如果存在）: [引用决策原文]

       请做 gap analysis，识别：
       1. 遗漏的需求或意图
       2. 表达模糊的地方
       3. scope creep / AI-slop
       4. 缺失的验收标准
       5. 未覆盖的边界情况
       6. **research 完整性**：
          - 扫描 proposal.md，找出所有"可能"、"maybe"、"needs investigation"等不确定性信号
          - 检查 `openspec/changes/<change-name>/research/` 目录是否存在对应的调研子目录
          - 如果 proposal 中有不确定点但 research/ 中没有对应调研 → 判断是否合理：
            - 如果 design.md 的 Decisions 部分已明确解决该不确定点 → 不标记
            - 如果 design 阶段遗漏了调研 → 标记为 🔴 缺失

      **信源优先级（冲突处理依据）**：
      1. proposal.md（最高）— WHY 和核心变更
      2. design.md — 技术决策
      3. specs — 详细需求

      **冲突处理规则**：
      - 低优先级与高优先级存在**明显冲突**时，给出具体的修改建议以对齐高优先级
      - 如果 design.md 与 specs 冲突，以 proposal 为基准回溯判定
      - 明确可自动修复的 → 标注「🔧 可自动修复：...」并说明修改内容
      - 需要用户判断的 → 标注「👤 需用户确认：...」并提供选项
      - 模糊不清的 → 标注「❓ 需追问：...」并说明需要什么信息")

       **说明**: 此循环是内容质量改进机制（Oracle 已成功完成 gap 分析 → subagent 修复 → 重新调用），
       不是 agent 调用失败的降级处理。如 Oracle 调用本身失败 → 按 fast fail 规则立即停住报错。

       应用 Oracle 的分析结果，循环执行以下冲突修复流程（**最多循环 3 轮**）：

       1. 如果有「🔧 可自动修复」项：
          对每个 🔧 项，读取 Oracle 指出的具体问题和修改建议，调用执行型 subagent 修复：
          task(category="unspecified-high", load_skills=[], run_in_background=false,
               prompt="根据以下 Oracle 差距分析结果修复对应的源文件或 artifact。
               只修复标注为 🔧 可自动修复的问题，不要修改其他内容。

               Oracle 修复建议：
               [将 Oracle 输出的 🔧 项及对应修改建议填入此处]")
          全部修复完成后，重新调用 Oracle 验证（回到本步骤）
      2. 如果只剩「👤 需用户确认」和/或「❓ 需追问」→ 停止循环
         - 需用户确认 → 提供方案让用户选择
         - 需追问 → 直接提问让用户回答
      3. 如果全部 ✅ Confirmed → Proceed
      4. **达到 3 轮上限时**：即使仍有「🔧 可自动修复」项，也停止循环，将所有未解决项（🔧/👤/❓）汇总展示给用户


       === PHASE 2：通过 Deep Agent 生成 ===

       Package all artifacts content and Oracle gap analysis results into a
       comprehensive prompt. Then delegate generation to a focused agent:

       task(category="deep", load_skills=[], run_in_background=false,
            prompt="Generate a task list (tasks.md) for the following change.

            Input context:
            - Proposal (动机和能力): [将 proposal.md 的核心内容填入此处]
            - Spec requirements: [将各 spec 的 key requirement 和 scenario 填入此处]
            - Design decisions: [将 design.md 的关键决策填入此处]
            - Oracle gap analysis results: [将 Oracle 的输出和冲突修复结果填入此处]

            The task list MUST:
            - Use `## Tasks` as section header
            - Use `### Wave N: Group Name` for sub-groupings
            - Each task starts with `- [ ] N.M Description`
            - Cover all spec requirements and design decisions
            - Reflect gap analysis results from Oracle
            - Be organized into logical waves of parallel-executable tasks")
    requires:
      - specs
      - design
  - id: critic
    generates: critic.md
    description: >
      Plan generation and multi-agent review. Generates
      .sisyphus/plans/<change-name>.md (OMO plan) and critic.md
      (review report with verdict).
    template: critic.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 critic.md 和 .sisyphus/plans/<change-name>.md。**

      === PHASE 1：读取上下文 ===

      Read these files:
      - `openspec/changes/<change-name>/tasks.md` — checkbox task list
      - `openspec/changes/<change-name>/specs/` — all spec files
      - `openspec/changes/<change-name>/design.md` — technical design
      - `openspec/changes/<change-name>/proposal.md` — proposal
      - `openspec/changes/<change-name>/research/` — technical research (if exists)

      === PHASE 2：基础结构检查 ===

      Check the basic structure of the change:
      1. `ls openspec/changes/<change-name>/specs/` — spec 目录存在且有文件（如果 proposal 无 Capabilities 则跳过此项）
      2. `test -f openspec/changes/<change-name>/tasks.md && echo exists` — tasks.md 存在
      3. `grep -c '^- \[' openspec/changes/<change-name>/tasks.md` — 至少 1 个 task checkbox

      If ANY check fails: STOP, list what's missing, wait for user.
      If all pass: Proceed.

      === PHASE 3：Spec 验证（强制） ===

      Run `openspec validate <change-name>` to check spec format.

      If validation passes → Proceed to PHASE 4.

      If validation ERRORS → Invoke Oracle for fix guidance:
      （格式修复通常不涉及内容冲突，信源优先级规则在此作为兜底保障。）
      如果 Oracle task() 调用失败（超时、不可用、出错），立即停止工作流（**fast fail，不得降级**）：
      - 向用户报告：「❌ Spec 格式验证中断：Oracle 调用失败。[错误信息]」
      - 不得自行分析验证错误，不得自行修复，不得跳过验证
      - 等待用户介入决定如何继续
      ```
      task(subagent_type="oracle", run_in_background=false, prompt="openspec validate 报告了以下格式错误：
      [复制验证错误信息]

      以下是出错的 requirement 原文块（供内容冲突判断参考）：
      [复制相关 requirement 的完整 `### Requirement:` 块，含所有 scenarios]

      请分析每个错误的原因并给出具体的修复建议。
      Spec 格式要求：
      - Requirement 必须以 `### Requirement: <name>` 开头
      - 描述中必须包含大写 MUST 或 SHALL（不能用中文"必须"）
      - 每个 requirement 至少一个 scenario
      - Scenario 以 `#### Scenario: <name>` 开头（4 个 #）
      - Scenario 正文包含 WHEN / THEN

      修复过程中如涉及内容冲突，按信源优先级处理：
        1. proposal.md（最高）— WHY 和核心变更
        2. design.md — 技术决策
        3. specs — 详细需求
      低优先级与高优先级明显冲突时，给出修改建议对齐高优先级，标注「🔧 可自动修复」。（格式修复通常不涉及内容冲突，此规则作为兜底保障。）")
      ```

      Apply Oracle's fix suggestions. Re-run `openspec validate`.
      Repeat until validation passes（**最多 3 轮**）。如果 3 轮后仍未通过，汇总所有剩余错误展示给用户。

      === PHASE 4：Oracle + Metis 并行审查 tasks.md ===

      Launch 1 Oracle + 1 Metis agent IN PARALLEL to review tasks.md.
      Oracle 专注于内容拆分合理性，Metis 专注于 OMO 格式合规性。
      注意：Oracle 和 Metis 在「优化建议」上各有侧重——Oracle 从内容必要性出发，Metis 从格式规则出发，两者互补而非重叠。

      ```
      ORACLE_REVIEW_PROMPT = "你正在对一个 OpenSpec change 的任务清单（tasks.md）进行 Oracle 评审。
      评审目标：评估任务拆分的合理性（内容导向），并在保证质量的前提下给出优化建议。
      按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

      审查文件：
      - tasks:    openspec/changes/<change-name>/tasks.md
      - proposal: openspec/changes/<change-name>/proposal.md
      - specs:    openspec/changes/<change-name>/specs/
      - design:   openspec/changes/<change-name>/design.md（如果存在）

      **信源优先级（冲突处理依据）**：
      1. proposal.md（最高）— WHY 和核心变更
      2. design.md — 技术决策
      3. specs — 详细需求

      请逐一检查以下 3 个维度：

      维度 1 — 内容拆分合理性：
      - 每个 task 是否足够原子化？（一个 task 只做一件事）
      - 有没有 task 拆分过粗（一个 task 包含多个独立功能）？
      - 有没有 task 拆分过细（多个 task 可以合并为一个）？
      - Wave 分组是否合理？同一 Wave 内的 task 是否互不依赖？
      - 不同 Wave 之间的依赖关系是否真实存在？

      维度 2 — 优化建议（从内容必要性出发）：
      - 哪些 task 之间的依赖是虚假的？（没有文件读写关系就不应该阻塞）
      - 哪些 task 可以提前到更早的 Wave 执行？
      - 当前的 Wave 划分是否可以减少 Wave 数量？
      - 每个 Wave 是否有足够的并发度？
      - 如果调整并发/顺序，是否会影响质量？

      维度 3 — 完整性与覆盖度：
      - 所有 spec requirement 是否都有对应的 task 覆盖？
      - design.md 的技术决策是否在 task 中体现？
      - 有无遗漏的边界场景（错误处理、并发、权限等）？

      输出格式：先逐维度分析，然后汇总问题清单，每个问题标注 severity。"

      METIS_REVIEW_PROMPT = "你正在对一个 OpenSpec change 的任务清单（tasks.md）进行 Metis 评审。
      评审目标：评估 OMO 格式合规性（格式规则驱动），并在保证质量的前提下给出优化建议。
      按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

      审查文件：
      - tasks: openspec/changes/<change-name>/tasks.md
      - 如果需了解 context，可阅读 proposal.md、specs/、design.md

      OMO Task 标准子字段（共 9 个）：
      1. **What to do** — 可执行的实施步骤
      2. **Must NOT do** — 明确的排除项/守卫栏
      3. **Recommended Agent Profile** — category + skills
      4. **References** — 代码模式参考（文件路径+行号）
      5. **Acceptance Criteria** — 可执行的验证命令（如 `bun test`、`curl`）
      6. **QA Scenarios** — 强制：至少 1 个快乐路径 + 1 个失败/边缘路径
      7. **Parallelization** — 并行组、阻塞关系
      8. **Evidence** — 验证证据路径（.sisyphus/evidence/）
      9. **Commit** — 是否提交及信息

      OMO Wave 规则：
      - Wave = 一组可并发执行的任务，同一 Wave 内默认并发
      - 不同 Wave 之间串行（前一个 Wave 全部完成后才开始下一个）
      - 每个 Wave 目标 5-8 个任务，少于 3 个 = under-splitting
      - 只有两种情况下任务需要串行：
        1. Input dependency：Task B 读取 Task A 的输出文件
        2. File conflict：Task A 和 Task B 修改同一文件
      - 没有文件读写关系的 task 不应有依赖关系

      请逐一检查以下 3 个维度：

      维度 1 — OMO 格式合规性（逐 task 表格检查）：
      | Task | What to do | Must NOT do | Agent Profile | References | Acceptance Criteria | QA Scenarios | Parallelization | Evidence |
      |------|-----------|-------------|---------------|------------|-------------------|--------------|-----------------|----------|
      | N.M  | ✅/❌      | ✅/❌        | ✅/❌          | ✅/❌       | ✅/❌              | ✅/❌         | ✅/❌            | ✅/❌     |
      - QA Scenarios 是否包含 Tool/Preconditions/Steps/Expected/Evidence 五要素？
      - Acceptance Criteria 是否是具体可执行的命令？
      - Recommended Agent Profile 的 category 是否匹配任务类型？

      维度 2 — Wave 结构合规性：
      - Wave 命名是否清晰？（Wave N: Group Name）
      - Wave 内任务数量是否合理？（5-8 个目标，不少于 3 个）
      - Wave 间的依赖关系是否反映在任务描述中？
      - 是否有 Wave 中混入了有依赖关系的 task？

      维度 3 — 优化建议（从格式规则出发）：
      - 哪些 task 的 QA Scenarios 不足？（最少 1 快乐路径 + 1 失败路径）
      - 哪些 task 的 Must NOT do 缺失？
      - 是否有更好的 Wave 划分可以减少总执行时间？
      - 所有优化建议必须明确标注「质量影响：无/低/中/高」"

      # Oracle（内容评审）+ Metis（格式评审）
      task(subagent_type="oracle", run_in_background=false, prompt=ORACLE_REVIEW_PROMPT)
      task(subagent_type="metis", run_in_background=false, prompt=METIS_REVIEW_PROMPT)
      ```

      **收集评审结果（以下步骤不可跳过）**：

      1. **逐 agent 提取发现**：先读取 Oracle 完整输出，列出所有 🔴/🟡/⚪。再读取 Metis 完整输出，列出所有 🔴/🟡/⚪。
      2. **自检**：确认两个 agent 结果都已读完。如有遗漏，回到 Step 1 重新读取。
      3. **合并去重**：按 severity 合并，标注来源（Oracle / Metis）。同一问题两个 agent 都发现时取更高 severity。
      4. **分类判定**：
          - 任一 agent 有 🔴 → BLOCKED，修复源文件后重新运行 PHASE 4（**最多 3 轮**，超限后汇总 🔴 问题给用户）
           **说明**: 此循环是内容质量改进机制（审查 agent 已成功完成分析 → subagent 修复 → 重新审查），
           不是 agent 调用失败的降级处理。如审查 agent 调用本身失败 → 按 fast fail 规则立即停住报错。
          - 仅 🟡/⚪ → 评估后决定是否修复
       5. **产出合并清单**：将合并后的发现清单写入输出，供后续 PHASE 引用。

      === PHASE 5：生成计划 ===

      Generate `.sisyphus/plans/<change-name>.md` — the OMO-compatible plan with 9 sections.

      Delegate plan generation via category="deep":

      task(category="deep", load_skills=[], run_in_background=false,
           prompt="Generate the OMO-compatible plan at .sisyphus/plans/<change-name>.md.

           输入文件摘要（已读取）：
           - Proposal: [将 proposal.md 的核心内容填入此处]
           - Spec requirements: [将各 spec 的关键 requirement 填入此处]
           - Design decisions: [将 design.md 的关键决策填入此处]
           - Task list: [将 tasks.md 的完整 task 列表填入此处]
           - Research: [将 research/ 的关键发现填入此处，没有则填无]

           The plan MUST include 9 sections using summary + link format:
           1. ## TL;DR — 1-2句概述（引用 proposal.md）
           2. ## Context — 2-3句背景（引用 proposal.md）
           3. ## Work Objectives — 每个 capability 及关键 requirement（引用 specs/）
           4. ## Verification Strategy — 引用 specs 的 scenarios
           5. ## Execution Strategy — 引用 design.md 和 research/
           6. ## Tasks — tasks.md 的 checkbox 展开，每个 task 含 What to do / Must NOT do / Agent Profile / References / Acceptance Criteria / QA Scenarios / Parallelization / Evidence / Commit
           7. ## Final Verification Wave — F1~F4
           8. ## Commit Strategy
           9. ## Success Criteria

           Key rules:
           - Task numbers must match tasks.md (N.M format)
           - Do NOT copy artifact verbatim (except Tasks' What to do)
           - Acceptance Criteria must be executable commands")

      === PHASE 6：Plan 结构验证 ===

      After writing the plan, validate:
      1. `grep -c '^## ' .sisyphus/plans/<change-name>.md` → must be at least 9
      2. `grep -q '## Tasks' .sisyphus/plans/<change-name>.md` → Tasks section exists
      3. `grep -q '## Final Verification Wave' .sisyphus/plans/<change-name>.md` → FVW exists
      4. `sed -n '/^## Tasks/,/^## /p' .sisyphus/plans/<change-name>.md | grep -c '^- \['` should equal `grep -c '^- \[' openspec/changes/<change-name>/tasks.md`

      If ANY check fails: STOP, fix the plan, re-validate（**最多 3 轮**，超限后汇总给用户）。

      === PHASE 7：Oracle + Metis + Momus 并行审查 Plan ===

      Launch 1 Oracle + 1 Metis + 1 Momus agent ALL IN PARALLEL to review the generated plan.
      Oracle 专注于 content 层面：design alignment、Verification Strategy、Success Criteria。
      Metis 专注于 quality 层面：9 节结构、QA Scenarios、Wave 结构。
      Momus 专注于最终可执行性判定：执行路径审查 + 风险矩阵审查。

      ```
      ORACLE_PLAN_REVIEW_PROMPT = "你正在评审 OMO plan 的内容准确性（Oracle 评审）。
      按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

      审查文件：
      - plan:  .sisyphus/plans/<change-name>.md
      - specs: openspec/changes/<change-name>/specs/
      - design: openspec/changes/<change-name>/design.md（如果存在）
      - tasks: openspec/changes/<change-name>/tasks.md
      - research: openspec/changes/<change-name>/research/（如果存在）

      信源优先级（冲突处理依据）：
      1. proposal.md（最高）— WHY 和核心变更
      2. design.md — 技术决策
      3. specs — 详细需求

      请逐一检查以下 3 个维度：

      维度 1 — Design Alignment：
      - plan 的 Execution Strategy 是否准确反映了 design 的技术决策？
      - design 中的风险和缓解措施是否在 plan 中体现？
      - research/ 的调研发现是否被引用？

      维度 2 — Verification Strategy：
      - Verification Strategy 是否覆盖了所有 spec scenarios？
      - 每个 scenario 是否有明确的验证方式？
      - FVW（Final Verification Wave）是否合理？

      维度 3 — Success Criteria：
      - Success Criteria 是否可衡量？（不是模糊描述）
      - 是否覆盖了所有 capability 的验收标准？

      输出格式：逐维度分析 + 问题汇总。"

      METIS_PLAN_REVIEW_PROMPT = "你正在评审 OMO plan 的结构和质量（Metis 评审）。
       按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

       审查文件：
       - plan: .sisyphus/plans/<change-name>.md
       - tasks: openspec/changes/<change-name>/tasks.md
       - research: openspec/changes/<change-name>/research/（如果存在）

       请逐一检查以下 3 个维度：

       维度 1 — 9 节结构完整性：
       - 所有 9 个 section 是否都存在？
       - 每个 section 是否使用 summary + link 模式？
       - section 间是否有逻辑连贯性？

       维度 2 — QA Scenarios 质量：
       - 每个 task 的 QA Scenarios 是否包含 Tool/Preconditions/Steps/Expected/Evidence 五要素？
       - 是否至少有一个快乐路径 + 一个失败/边缘路径？

       维度 3 — Wave 结构与并发：
       - Wave 分组是否合理？
       - 同一 Wave 内的 task 是否确实可以并发执行？
       - 不同 Wave 之间的依赖是否真实？
       - 是否有虚假依赖可以拆掉以加快执行？
       - 如果 research/ 存在：调研发现是否在 plan 的 Work Objectives 或 Execution Strategy 中得到体现？

      输出格式：逐维度分析 + 问题汇总。"

      MOMUS_PLAN_REVIEW_PROMPT = "你正在对 OMO plan 执行双重门禁审查（Momus 评审）。

      **Part A — 执行路径审查（可操作性）**：
      1. Wave 依赖是否合理？同一 Wave 内的 task 是否真的可以并发？
      2. 每个 task 的 Acceptance Criteria 是否可执行？（必须是具体的命令，如 `bun test`、`curl`）
      3. 有无明显的执行顺序错误？
      4. FVW 是否覆盖了关键验证点？
      5. 如果 research/ 存在：调研结论是否被 plan 正确引用？

      **Part B — 风险矩阵审查（遗漏覆盖）**：
      1. 是否有遗漏的边界场景（空值、错误路径、并发冲突、权限不足）？
      2. QA Scenarios 是否至少包含一个快乐路径 + 一个失败路径？
      3. Commit Strategy 是否合理？是否有多人协作的冲突风险？
      4. Success Criteria 是否真正可衡量？
      5. 如果 research/ 存在：是否有 research 发现未被 plan 覆盖？

      审查文件：
      - plan:  .sisyphus/plans/<change-name>.md
      - tasks: openspec/changes/<change-name>/tasks.md
      - research: openspec/changes/<change-name>/research/（如果存在）

      最终判定（二选一，综合 Part A 和 Part B）：
      - ✅ OKAY — plan 可执行，无 blocking issues
      - ❌ REJECT — plan 不可执行，需要修复后重新评审

      输出格式：先按 Part A / Part B 分别分析，最后给出综合判定。"

      # Oracle（内容）+ Metis（结构）+ Momus（门禁）
      task(subagent_type="oracle", run_in_background=false, prompt=ORACLE_PLAN_REVIEW_PROMPT)
      task(subagent_type="metis", run_in_background=false, prompt=METIS_PLAN_REVIEW_PROMPT)
      task(subagent_type="momus", run_in_background=false, prompt=MOMUS_PLAN_REVIEW_PROMPT)
      ```

      **收集评审结果（以下步骤不可跳过）**：

      1. **逐 agent 提取发现**：读取 Oracle 完整输出 → 读取 Metis 完整输出 → 读取 Momus 完整输出。每个 agent 单独列出发现。
      2. **自检**：确认所有 3 个 agent 结果都已读完。如有遗漏，回到 Step 1 重新读取。
      3. **合并去重**：按 severity 合并，标注来源（Oracle / Metis / Momus）。同一问题多个 agent 都发现时取更高 severity。
      4. **分类判定**：
          - Momus ❌ REJECT → 修复 plan 后重新运行 PHASE 7（**最多 3 轮**，超限后汇总给用户）
          - Oracle/Metis 有 🔴 → BLOCKED，修复 plan 后重新运行 PHASE 7（**最多 3 轮**，超限后汇总给用户）
          **说明**: 此循环是内容质量改进机制（审查 agent 已成功完成分析 → subagent 修复 → 重新审查），
           不是 agent 调用失败的降级处理。如审查 agent 调用本身失败 → 按 fast fail 规则立即停住报错。
          - 仅 🟡/⚪ → 评估后决定是否修复
       5. **产出合并清单**：将合并后的发现清单写入输出，供后续 PHASE 引用。

      === PHASE 8：通过 Deep Agent 生成 critic.md ===

      Package the complete review findings from PHASE 4 and PHASE 7 into a
      comprehensive prompt. Then delegate to a focused agent:

      task(category="deep", load_skills=[], run_in_background=false,
           prompt="Generate the critic.md file for this OpenSpec change.

           Review findings from PHASE 4 (tasks.md review by Oracle + Metis):
           [将 PHASE 4 的 Oracle 和 Metis 审查发现的 🔴/🟡/⚪ 清单填入此处]

           Review findings from PHASE 7 (plan review by Oracle + Metis + Momus):
           [将 PHASE 7 的 Oracle、Metis、Momus 审查发现的 🔴/🟡/⚪ 清单填入此处]

           The critic.md MUST:
           - Follow the template at `schemas/spec-driven/templates/critic.md`
           - Include a summary of ALL review findings from both phases
           - List findings grouped by source (Oracle / Metis / Momus)
           - For each finding, include severity (🔴/🟡/⚪) and description

           Determine VERDICT:
           - Momus ❌ REJECT or any 🔴 from others → **🔴 BLOCKED**
           - Only 🟡/⚪ → **⚠️ CONDITIONAL**
           - No issues → **✅ PASS**")

      === PHASE 9：阻塞判定 ===

      - If BLOCKED: "🛑 Critic BLOCKED. Fix 🔴 issues above, then re-create critic artifact. Re-run critic（最多 3 轮）。"
      - If CONDITIONAL: List 🟡 items. User can acknowledge risks or fix.
      - If PASS: "✅ All checks passed. Proceed to apply."
    requires:
      - tasks
apply:
  requires:
    - critic
  tracks: tasks.md
  instruction: |
    __LANG_PLACEHOLDER__

    **IMPORTANT: This instruction overrides the skill/command's execution logic.
    Ignore any external "step 6" that says to manually execute tasks one by one.
    Follow ONLY this instruction's flow: verdict check → `/start-work` → Oracle verify → sync.**

    Read `openspec/changes/<change-name>/critic.md` first and check the VERDICT:

    1. Read the `## Verdict` section and find `**VERDICT**: ...`
    2. If `🔴 BLOCKED`: STOP. Print "🛑 Critic BLOCKED this change. Fix issues and re-run critic." Do NOT proceed.
    3. If `⚠️ CONDITIONAL`: List the 🟡 items. Ask user to confirm before proceeding.
    4. If `✅ PASS`: Continue.

    After VERDICT is clear, call:
    ```
    /start-work .sisyphus/plans/<change-name>.md
    ```

    This invokes OMO's built-in plan executor (Atlas) which reads the plan
    file and executes tasks with proper delegation, verification, and session
    continuity.

    After `/start-work` completes, capture the list of changed files:
    ```
    git diff --name-only HEAD
    ```
    This tells Oracle which files were created or modified by this change.
    Then run Oracle verification with a loop of up to 3 rounds.

     如果 Oracle task() 调用失败（超时、不可用、出错），立即停止工作流（**fast fail，不得降级**）：
     - 向用户报告：「❌ 实现验证中断：Oracle 调用失败。[错误信息]」
     - 不得自行分析 git diff，不得自行生成 verify.md，不得自行判定
     - 等待用户介入

    ```
    task(subagent_type="oracle", run_in_background=false, prompt="你正在验证实现产出与 OpenSpec change artifacts 的一致性。
    请检查所有实现产出（代码、配置、文档等）是否按 proposal、spec、design 的要求正确实现。
    按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

    审查文件：
    - proposal: openspec/changes/<change-name>/proposal.md
    - specs:    openspec/changes/<change-name>/specs/
    - design:   openspec/changes/<change-name>/design.md（如果存在）
    - tasks:    openspec/changes/<change-name>/tasks.md
    - plan:     .sisyphus/plans/<change-name>.md
    - research: openspec/changes/<change-name>/research/（如果存在）

    变更文件清单（来自 git diff --name-only HEAD）：
    [在此填入上个命令的输出]

    请逐一检查变更文件是否满足以下条件：

    维度 1 — Spec 合规性：
    - 每个 spec requirement 的 scenario 是否在实现中有对应体现？
    - 实现行为是否满足 spec 中 WHEN/THEN 的条件？

    维度 2 — Design 对齐（实现与 Design 一致性）：
    - 实现方案是否符合 design.md 的技术决策？
    - design 中明确排除的 Non-Goals 是否在实现中出现？
    - research/ 中的调研结论是否在实现中得到正确应用？

    维度 3 — Proposal 范围：
    - 实现内容是否在 proposal 定义的 Capabilities 范围内？
    - 是否有超出 proposal 范围的 scope leak？
    - proposal 中的所有 Capability 是否都有对应实现？

    维度 4 — Task 完成度：
    - tasks.md 中的所有 task 是否都有对应的实现产出？
    - plan 中每个 task 的 Evidence 路径（.sisyphus/evidence/）是否存在且有效？

    输出格式：逐维度分析 + 问题汇总 + 总体结论。

    最终判定标准：
    - 🔴 BLOCKED：存在严重的实现偏离，必须修复才能继续
    - ⚠️ CONDITIONAL：实现基本正确但有 🟡/⚪ 瑕疵，可接受风险继续推进
    注意：请谨慎区分 BLOCKED 和 CONDITIONAL。只有确实阻碍功能正确性的问题才标 🔴。

    将完整结果保存到 openspec/changes/<change-name>/verify-round-{N}.md。")
    ```

    读取 `openspec/changes/<change-name>/verify-round-{N}.md` 中的最终判定：
    1. 如果 ✅ PASS → 通过，继续
     2. 如果 🔴 BLOCKED：
          读取 verify-round-{N}.md 中的 🔴 问题列表。
          对每个 🔴 问题，调用执行型 subagent 修复：
          task(category="unspecified-high", load_skills=[], run_in_background=false,
               prompt="根据以下变更验证结果修复实现产出。只修复标注为 🔴 的问题，不要修改 🟡/⚪ 内容。

               Oracle 验证结果中的 🔴 问题：
               [将 verify-round-{N}.md 中的 🔴 问题列表及修复建议填入此处]")
          **修复策略**：
          - 每轮最多修复 3 个 🔴 问题，防止一次改动过大引入新问题
          - 修复前记录当前状态（git stash），以便失败后回滚
          - 修复后不要重新运行 /start-work，只修改产出文件
          修复完成后重新运行 Oracle 验证（**最多 3 轮**，超限后汇总给用户）
           **说明**: 此循环是内容质量改进机制（Oracle 已成功完成验证 → subagent 修复 → 重新验证），
           不是 agent 调用失败的降级处理。如 Oracle 调用本身失败 → 按 fast fail 规则立即停住报错。
    3. 如果 ⚠️ CONDITIONAL → 汇总 🟡/⚪ 问题展示给用户，让用户决定是接受继续还是修复后再重新运行 Oracle 验证

    **Sync Protocol**:
    - The plan file's `## Tasks` section tracks checkbox states for `/start-work`
    - `openspec/changes/<change-name>/tasks.md` is the OpenSpec source of truth
    - After `/start-work` completes or pauses, copy checkbox states from
      `.sisyphus/plans/<change-name>.md` to
      `openspec/changes/<change-name>/tasks.md` to keep them in sync
    - Run: diff <(grep '^- \[' openspec/changes/<change-name>/tasks.md) <(sed -n '/^## Tasks/,/^## /p' .sisyphus/plans/<change-name>.md | grep '^- \[')
      to verify consistency on pause/all_done
