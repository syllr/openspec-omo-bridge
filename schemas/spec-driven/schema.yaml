    3. 任一不满足 → 视为格式异常

    **格式异常处理**（**不自动重新生成**，避免覆盖用户的合法修改）：
    - 提示用户：「⚠️ tasks.md 格式异常。可能是：(1) 用错工具生成（如手动编辑或旧版 sync）；(2) OpenCode cache 未刷新。建议重新运行 tasks 阶段 PHASE 5 重新生成。」
    - 询问用户选择：
      1. **接受现状继续** → 进入 Step 2
      2. **重新跑 tasks PHASE 5** → 退出 apply，让用户重跑 tasks 阶段
      3. **停止** → 保留当前状态，用户手动处理

    1. 两个文件都存在 + tasks.md 格式正确 → 继续
    2. 任一文件不存在 → 停止，提示用户：「🔴 tasks 阶段未完成。请先完成 tasks 阶段生成 plan + tasks.md。如果尚未创建 change，请先运行 `openspec new change --schema spec-driven <change-name>`。」
    3. tasks.md 格式异常 → 按上述 3 选 1 处理

    === Step 2：执行 /start-work ===

    验证后，调用：
    ```
    /start-work .omo/plans/<change-name>.md
    ```

    **执行结果处理：**
    1. **完成**：继续 Oracle 验证
    2. **暂停**：告知用户后续可重新运行 /start-work 继续
    3. **失败**：向用户报告错误，**仅展示错误信息本身**（**不暴露内部 stack trace、库路径、版本号等实现细节**），等待用户介入
       - **plan 本身的问题**（如 task 引用不存在的文件、Acceptance Criteria 命令拼错）→ 建议重新跑 tasks 阶段修复 plan
       - **OMO 工具问题**（如 Atlas 解析失败、task 执行超时）→ 建议查看 OMO 日志
       - **OpenCode 环境问题**（如 tools 未加载、plugin 缺失）→ 建议重启 OpenCode 并运行 `bash scripts/sync.sh`

    === Step 2.5：同步 tasks.md 镜像 ===

    /start-work 完成后，plan 的 checkbox 状态已更新。调用 `omo_spec_sync_tasks_from_plan` OpenCode tool（参数：`change_name=<change-name>`）把最新状态镜像到 tasks.md。

    这样 OpenSpec apply skill（如果被加载）和后续状态检查能读到最新的任务进度。

    **触发时机**（E3）：无论 /start-work 是「完成」还是「暂停」状态，都必须调用 sync tool 同步当前 checkbox 状态。「暂停」状态时部分 task 未完成，tasks.md 应反映部分进度而非 0% 完成。

    === Step 3：Oracle 验证（最多 3 轮）===

    /start-work 完成后，调用 `omo_spec_prepare_verification_context` OpenCode tool（参数：`change_name=<change-name>`）准备验证上下文。

    tool 负责：读取所有 artifacts（proposal/specs/design/plan）+ 组装 5 维度验证清单（Spec 合规性 / Design 对齐 / Proposal 范围 / Task 完成度 / 非功能性合规性）+ 严重程度规则。

    **不通过 tool 捕获 git diff**——由 Oracle 自行执行（避免 Bun.spawn 跨运行时依赖）。

    拿到 tool 返回的上下文后，将上下文传给 Oracle 审查：

    ```
    task(subagent_type="oracle", prompt="你正在验证实现产出与 OpenSpec change artifacts 的一致性。
    请根据以下验证上下文，按 5 维度（Spec 合规性 / Design 对齐 / Proposal 范围 / Task 完成度 / 非功能性合规性）输出发现。
    按严重程度标注（🔴阻塞 / 🟡警告 / ⚪建议），对每个 🔴 给出具体修复建议。

    **步骤 1**：执行 `git diff --name-only HEAD` 获取变更文件列表（空仓库时 fallback `git ls-files --others --exclude-standard`）。

    **步骤 2**：用变更文件列表 + 以下 artifacts 上下文做 5 维度审查。

    [将 omo_spec_prepare_verification_context tool 的完整输出填入此处]")
    ```

    读取 Oracle 输出中的最终判定：
    1. 如果 ✅ PASS → 完成
    2. 如果 🔴 BLOCKED（**最多 3 轮**）：
         将所有 🔴 问题打包，调用 agent 一次性修复：
         task(category="write", load_skills=[],
              prompt="根据以下验证结果修复实现产出。只修复标记为 🔴 的问题，不要修改其他内容。
              Oracle 验证结果中的所有 🔴 问题：
              [将 Oracle 输出的 🔴 问题列表及修复建议填入此处]")
         修复完成后重新调用 `omo_spec_prepare_verification_context` 并重跑 Oracle 验证

         **超限处理**（3 轮后仍有 🔴）：汇总所有剩余 🔴 给用户，让用户选择：
         1. **接受剩余风险** → 视为 CONDITIONAL，继续
         2. **手动修复** → 保留当前状态，用户编辑后重新跑 Step 3
         3. **停止** → 放弃本次 apply，让用户决定后续
    3. 如果 ⚠️ CONDITIONAL → 汇总 🟡/⚪ 展示给用户，让用户决定是否接受

    **注意**：Step 2.5 的 `omo_spec_sync_tasks_from_plan` tool 调用是 apply 阶段**唯一**的 tasks.md 写操作。
    任务完成状态通过 sync tool 从 plan 文件的 checkbox 镜像而来。

    === Step 3.5：最终同步 tasks.md 镜像 ===

    Step 3 验证结束后（无论 PASS / CONDITIONAL / 超限），**最终**调用一次 `omo_spec_sync_tasks_from_plan` tool（参数：`change_name=<change-name>`）同步 plan 状态到 tasks.md。

    **目的**：保证 apply 阶段结束时 tasks.md 100% 反映 plan checkbox 最终状态。归档时（`openspec archive`）能读到准确完成度。

    **幂等性**：plan checkbox 没变就重复输出。3 种终态对应：
    - ✅ PASS：tasks.md 显示 100% 完成
    - ⚠️ CONDITIONAL：tasks.md 显示部分完成 + 残留风险已知
    - 🛑 超限停止：tasks.md 显示当前完成度，保留用户后续处理

    完整生命周期（tasks → apply）：
    1. tasks 阶段：生成 plan（PHASE 3）+ plan 审查 + verdict 内联处理（PHASE 4）+ 调 sync tool 生成 tasks.md 镜像（PHASE 5）
    2. apply Step 2.5：sync tool 重新同步 checkbox 状态（/start-work 之后）
    3. apply Step 3.5（本步）：sync tool 最终同步（apply 结束之前）
