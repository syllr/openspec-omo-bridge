name: spec-driven
version: 1
description: Default OpenSpec workflow - proposal → design → specs → tasks → apply

artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    tracks: proposal.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 proposal.md。**

      === Fast Fail Rule (Global) ===

      **任何 task()、tool() 或 skill() 调用失败（超时、agent 不可用、返回错误等），立即停止工作流，不得降级、不得重试、不得跳过、不得自行替代执行。**

      失败处理流程：
      1. 立即停止当前 PHASE
      2. 向用户报告：「🔴 [PHASE 名] 中断：[agent/tool/skill 名] 调用失败。[错误信息]」
      3. 等待用户介入

      === PHASE 1：上下文提取 ===

      在编写 proposal 之前，系统性地回顾当前对话，提取所有与本变更相关的信息。

      **如果对话超过 30 条消息（用户 + AI 的交流）：**
      1. 将对话分为三段：前期、中期、后期
      2. 从每段中分别提取关键点（每段 3-8 条）
      3. 合并所有段落的要点，去重并综合
      4. 特别注意中期段落中出现但后续未被重提的点
      5. 标记在任何段落中发现的不确定信号

      **对于较短的对话：** 直接从完整对话中提取。

      将发现组织为 6 个类别：

      1. **核心动机**：什么驱动了这次讨论？用户的明确痛点是什么？
      2. **变更范围**：讨论到的每个具体能力、修改或移除项，包括提到的技术约束
      3. **显式约束**：用户明确的边界——"必须用 X"、"不能用 Y"、兼容性要求
      4. **显式非目标**：用户明确说不在范围内的事项
      5. **不确定信号**：用户说"需要调研"、"不确定"、"可能需要研究"的点，
         每个标记为 `[NEEDS INVESTIGATION]`
      6. **影响系统**：用户提到的代码、API、依赖、团队

      **这是思考步骤——不写入文件。**

      **输入验证**：如果以下核心类别为空（"核心动机"或"变更范围"或"影响系统"任意一个为空），停止工作流，提示用户：「🔴 proposal 上下文不足。请补充：核心动机 / 变更范围 / 影响系统 至少一项，否则无法生成完整 proposal。」
      - 这 3 类是 proposal.md 的**最低信息要求**，缺一不可
      - 其他 3 类（显式约束、显式非目标、不确定信号）允许为空

      === PHASE 2：生成 ===

      读取模板文件 `schemas/spec-driven/templates/proposal.md`，了解确切的输出结构。

      在 `openspec/changes/<change-name>/proposal.md` 创建提案文档。

      按模板结构编写全部 4 个部分：
      - **Why**（动机）：1-2 句话说明问题或机会
      - **What Changes**（变更内容）：具体的变更项列表，不兼容变更标记 **BREAKING**
      - **Capabilities**（能力清单）：
        - New Capabilities（新能力）：kebab-case 命名，每个对应一个 spec 文件
        - Modified Capabilities（修改的能力）：检查 `openspec/specs/` 中已有的名称
      - **Impact**（影响）：受影响的代码、API、依赖、系统

      **完整性优先**——覆盖 PHASE 1 中的所有要点。保持语言简洁，但不以覆盖度为代价。

      提案应让技术和非技术读者都能理解。

      编写后验证输出是否完全遵循模板结构。

      **模板结构验证**（AI 自检）：proposal.md 必须包含模板的 4 个部分：
      - `## Why`（动机）
      - `## What Changes`（变更内容）
      - `## Capabilities`（能力清单，含 New/Modified/Removed）
      - `## Impact`（影响）

      缺少任一部分 → 重新生成。**不**进入 PHASE 3。

      === PHASE 3：Oracle 审查 ===

      启动 1 个 Oracle agent 审查生成的 proposal。
      调用前将占位符替换为实际内容。

      ```
      task(subagent_type="oracle", prompt="
      你正在审查一个 OpenSpec 变更提案。请逐一检查以下所有检查项：

      PHASE 1 的上下文提取结果：
      [将 PHASE 1 的提取输出粘贴此处]

      生成的 proposal.md 路径：openspec/changes/<change-name>/proposal.md

      1. 内容完整性——PHASE 1 提取的所有要点是否在 proposal 中体现？
      2. 范围控制——提案中是否有对话中未讨论的内容（范围蔓延）？
      3. 结构完整性——所有必需的部分是否存在且格式正确？
      4. 格式卫生——有无空部分、未替换占位符、[TODO]/[TBD] 标记？
      5. 命名规范——Capabilities 是否使用 kebab-case？
      6. Capability 粒度——每个 Capability 是否独立可测？有无过粗（应拆分为多个 spec）或过细（可合并）的情况？
      7. 边界清晰——What Changes / Capabilities / Impact 是否没有混淆？
      8. 可操作性——Capabilities 是否具体到可以衍生 specs？Impact 是否明确？
      9. 模糊性——表达是否清晰？有无 AI-slop（模糊空洞的表述）？
      10. 不确定信号——需要调研的点是否已用 [NEEDS INVESTIGATION] 标记？

      严重程度：🔴 阻塞 / 🟡警告 / ⚪ 建议
      输出格式：按严重程度列出发现，对每个 🔴/🟡 给出具体修改建议
      ")
      ```

      **收集评审结果：**
      1. 读取 Oracle 输出，列出所有 🔴/🟡/⚪ 发现
      2. 分类判定：
         - 有 🔴 或 🟡 → BLOCKED，AI 用 Read/Edit 工具直接修复 proposal.md。只修复标记为 🔴/🟡 的问题，不要修改其他内容。修复完成后重新运行 PHASE 3（最多 3 轮）
         - 仅 ⚪ → 展示给用户


      === PHASE 4：循环与继续 ===

       - 如果在 PHASE 3 中发现 🔴：修复 proposal.md，从 PHASE 3 重新运行
       - 最多 3 轮。3 轮后仍有 🔴：将剩余问题展示给用户
       - 全部清除：proposal 完成，进入下一个 artifact
    requires: []
  - id: design
    generates: design.md
    description: Technical design document with implementation details (generated before specs)
    template: design.md
    tracks: design.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 design.md。**

      === Fast Fail Rule (Global) ===

      **任何 task()、tool() 或 skill() 调用失败（超时、agent 不可用、返回错误等），立即停止工作流，不得降级、不得重试、不得跳过、不得自行替代执行。**

      失败处理流程：
      1. 立即停止当前 PHASE
      2. 向用户报告：「🔴 [PHASE 名] 中断：[agent/tool/skill 名] 调用失败。[错误信息]」
      3. 等待用户介入

      === PHASE 1：读取输入 ===

      读取以下文件提取设计所需信息：
      - `openspec/changes/<change-name>/proposal.md` — 动机和能力

      === PHASE 2：技术调研 ===

      **触发条件**：仅当 `openspec/changes/<change-name>/proposal.md` 中**显式包含 `[NEEDS INVESTIGATION]` 标记**时执行本阶段。
      如果 proposal.md 没有 `[NEEDS INVESTIGATION]` 标记 → **跳过整个 PHASE 2**，直接进入 PHASE 3。

      对于每个标记为 `[NEEDS INVESTIGATION]` 的点：

       1. **识别调研主题**：从 proposal.md 中提取每个标记点，命名成 kebab-case 的调研主题。例如：`api-signature-format`、`plugin-config-schema`

       2. **单波 librarian 并发调研**：

          所有调研产物保存到 `openspec/changes/<change-name>/research/<topic>/`。

          **所有 librarian 并发**：在同一条消息中发起所有主题的 librarian 任务。每个 librarian 调研其主题的文档或源代码，**直接给出代码示例 + 调用方式**：

          ```
           task(subagent_type="librarian", prompt="调研 plugin.xml 配置声明格式，给出代码示例和调用方式。")
           task(subagent_type="librarian", prompt="调研 OAuth2 PKCE 流程，给出代码示例和调用方式。")
           # ...N 个 topic，全部并发
           ```

           等待所有 librarian 完成后，将每个结果保存到 `research/<topic>/notes.md`


        3. **用户确认**：向用户展示所有调研结果的摘要，**等待用户明确确认后才能继续**。

           **超时处理**：如果用户超过 10 分钟未回复，提示用户：「⚠️ 调研结果已准备好超过 10 分钟未确认，请明确确认或拒绝」。**不要自动确认**（避免未审视的调研结论被采纳）。

          确认后的最终结构：

          ```
          openspec/changes/<change-name>/research/
          ├── index.md                    ← 所有调研点的摘要 + 最终结论
          ├── <topic-1>/                  ← 每个调研点一个子目录
          │   └── notes.md               ← 调研笔记（文档摘录、分析、代码示例、调用方式）
          └── <topic-2>/
              ├── notes.md
              └── ...
          ```

       **重要**：
       - research/ 目录是**可选的** — 只有 proposal 中存在 `[NEEDS INVESTIGATION]` 标记时才创建
       - notes.md 应包含**代码示例 + 调用方式**

      === PHASE 3：生成 design.md ===

      AI 用 Read/Write 工具直接创建 design.md：

      - 读取 `openspec/changes/<change-name>/proposal.md` — 动机和能力
      - 读取 `openspec/changes/<change-name>/research/` — 技术调研（如果存在）

      设计文档必须包含以下部分：

           1. **Context**（上下文）：背景、当前状态、约束、干系人
           2. **Goals / Non-Goals**（目标/非目标）：设计要实现的和明确排除的
           3. **Decisions**（决策）：关键技术选择及理由（为什么选 X 不选 Y？）。包含考虑过的替代方案
           4. **Risks / Trade-offs**（风险/权衡）：已知限制和可能出错的地方。格式：[风险] → 缓解措施
           5. **Migration Plan**（迁移计划）：部署步骤、回滚策略（如适用）
           6. **Open Questions**（未决问题）：尚未解决的决策或未知事项

           关键要求：
           - 关注架构和方法，而非逐行实现
           - 每个设计决策必须对应至少一个 proposal 中的 Capability
           - 如果存在 research findings，在相关 Decisions 中引用，用 `详见 research/<topic>/notes.md` 格式
           - 解释每个技术决策背后的"为什么"
           - 保持聚焦和可执行")


       生成后验证 design.md 是否覆盖所有必需部分。如果 research/ 存在，确认调研发现已在 Decisions 中被引用。
    requires:
      - proposal
  - id: specs
    generates: specs/**/*.md
    description: Detailed specifications for the change (generated after design)
    template: spec.md
    tracks: specs/**/*.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。仅生成 spec 文件。**

      === Fast Fail Rule (Global) ===

      **任何 task()、tool() 或 skill() 调用失败（超时、agent 不可用、返回错误等），立即停止工作流，不得降级、不得重试、不得跳过、不得自行替代执行。**

      失败处理流程：
      1. 立即停止当前 PHASE
      2. 向用户报告：「🔴 [PHASE 名] 中断：[agent/tool/skill 名] 调用失败。[错误信息]」
      3. 等待用户介入

      === PHASE 1：读取输入 ===

      读取以下文件，提取 spec 所需的关键信息：
      - `openspec/changes/<change-name>/proposal.md` — 动机和 Capabilities
      - `openspec/changes/<change-name>/design.md` — 技术决策和设计细节
      - `openspec/changes/<change-name>/research/` — 技术调研结论（如果存在）

      **Capabilities 必填检查**：如果 proposal 没有列出任何 Capabilities（New 和 Modified 部分都为空），**停止工作流**。


      向用户报告：「🔴 proposal 没有列出任何 Capabilities，无法继续。请补充 proposal 的 New 或 Modified Capabilities。如果此次变更不涉及代码（如纯文档/重构），请考虑其他流程。」

      **Modified Capability 路径检查**：对 proposal 中列出的每个 Modified Capability，检查 `openspec/specs/<capability>/spec.md` 是否存在。如果不存在，停止工作流，列出所有缺失路径，询问用户是否改为 New Capability 或先创建基础 spec。

      === PHASE 2：生成 spec 文件 ===

      读取以下文件提取必要信息：
      - `openspec/changes/<change-name>/proposal.md` — 动机和 Capabilities
      - `openspec/changes/<change-name>/design.md` — 技术决策和设计细节
      - `openspec/changes/<change-name>/research/` — 技术调研结论（如果存在）

      用 Write 工具为 proposal 的 Capabilities 部分列出的每个能力创建一个 spec 文件：
      - 新能力：使用 proposal 中确切的 kebab-case 名称（specs/<capability>/spec.md）
      - 修改的能力：使用 openspec/specs/<capability> 中已有的 spec 文件夹名称

      **VALIDATION RULES**（openspec validate 强制检查以下规则）：
      1. 每个 requirement 必须以 `### Requirement: <name>` 开头
      2. Requirement 描述中必须包含大写 MUST 或 SHALL，不要用中文"必须"
         - 肯定式："The system MUST ..."
         - 否定式："The system MUST NOT ..."
      3. 每个 requirement 必须至少有一个 scenario
      4. 每个 scenario 必须以 `#### Scenario: <name>` 开头（恰好 4 个 #）
      5. 每个 scenario 正文必须包含 WHEN / THEN 关键词

      **Delta 操作**（使用 ## 标题）：
      - **ADDED Requirements**（新增需求）：新能力
      - **MODIFIED Requirements**（修改的需求）：行为变更，必须包含完整更新内容
      - **REMOVED Requirements**（移除的需求）：已废弃功能，必须包含**原因**和**迁移方案**
      - **RENAMED Requirements**（重命名的需求）：仅名称变更，使用 FROM:/TO: 格式

      **MODIFIED requirements 工作流**：
      1. 在 openspec/specs/<capability>/spec.md 中找到现有 requirement
      2. 复制完整的 requirement 块（从 ### Requirement: 到所有 scenarios）
      3. 粘贴到 ## MODIFIED Requirements 下，编辑以反映新行为
      4. 确保标题文本精确匹配

      **常见陷阱**：使用 MODIFIED 但内容部分丢失，会在归档时丢失细节。
      如果添加不改变现有行为的新关注点，请使用 ADDED。

      **Spec 应该是可测试的** —— 每个 scenario 都是一个潜在的测试用例。

      **Example 格式参考**：
      ```
      ## ADDED Requirements
      ### Requirement: User can export data
      The system SHALL allow users to export their data in CSV format.
      #### Scenario: Successful export
      - **WHEN** user clicks "Export" button
      - **THEN** system downloads a CSV file with all user data
      ```


      === PHASE 3：验证 ===

      编写完所有 spec 文件后，运行：
      `openspec validate <change-name>`

      **结果分级处理**（E12）：
      - 命令不存在 → 停止，提示用户：「🔴 OpenSpec CLI 未安装。请先运行 `npm install -g @fission-ai/openspec`。」
      - 返回 ERROR → 修复所有 ERROR 后重新运行，直到通过
      - 返回 WARNING → 展示给用户，由用户决定是否修复（不得自行决定忽略）
      - 返回 OK → 继续
    requires:
      - proposal
      - design
  - id: tasks
    generates: tasks.md
    description: >
      Spec validation, gap analysis, plan generation (with Metis
      consultation), multi-agent review, and tasks.md mirroring.
      Validates specs, runs Oracle gap analysis, generates
      .omo/plans/<name>.md (OMO plan), reviews it via
      omo_spec_check_plan + Oracle + Momus, and syncs to
      tasks.md via omo_spec_plan_to_tasks tool.
    template: tasks.md
    tracks: tasks.md
    instruction: |
      __LANG_PLACEHOLDER__

      **范围限制：不要修改任何源代码。本阶段产出：`.omo/plans/<change-name>.md` + `tasks.md`（由 sync tool 镜像生成）。**

      === Fast Fail Rule (Global) ===

      **任何 task()、tool() 或 skill() 调用失败（超时、agent 不可用、返回错误等），立即停止工作流，不得降级、不得重试、不得跳过、不得自行替代执行。**

      失败处理流程：
      1. 立即停止当前 PHASE
      2. 向用户报告：「🔴 [PHASE 名] 中断：[agent/tool/skill 名] 调用失败。[错误信息]」
      3. 等待用户介入

      === OpenCode Tool 调用约定（必读，重要）===

      本阶段涉及 2 个 **OpenCode plugin 工具**（由本 session 的 tool registry 自动加载，不要走 shell）：

      - `omo_spec_check_plan` — 验证 OMO plan 结构（11 项检查）
      - `omo_spec_plan_to_tasks` — 镜像 plan → tasks.md

      ✅ **正确**：通过 OpenCode tool 机制直接调用，工具面板会自动展示 JSON 参数
      ❌ **错误**：在 bash 中执行 kebab-case 形式（如 `omo-spec-plan-to-tasks`）——这些 **不是 CLI 二进制**，执行会报 `command not found: omo-spec-plan-to-tasks`

      **判断口诀**：snake_case 名称 + OpenCode plugin tool = 走 tool 机制，不要走 bash。

      === PHASE 1：读取上下文 + Spec 验证 ===

      **1.1 读取以下文件：**
      - `openspec/changes/<change-name>/proposal.md` — 动机和能力
      - `openspec/changes/<change-name>/specs/` — 需求和验收场景
      - `openspec/changes/<change-name>/design.md` — 技术方案、决策、风险
      - `openspec/changes/<change-name>/research/` — 技术调研（如果存在）

      **1.2 Spec 验证**：

      运行 `openspec validate <change-name>` 检查 spec 格式。

      - 通过 → 继续
      - 失败 → 显示错误给用户，由用户决定如何修复。不得自行修复。

      === PHASE 2：Oracle 差距分析 ===

      在生成 plan 之前，调用 Oracle 做差距分析。

      ```
      GAP_ANALYSIS_PROMPT = "你正在审查一个 OpenSpec change 的产物，为生成 OMO plan 做准备。

      审查文件：
      - `openspec/changes/<change-name>/proposal.md` — 动机和能力
      - `openspec/changes/<change-name>/specs/` — 需求和验收场景
      - `openspec/changes/<change-name>/design.md` — 技术方案、决策、风险
      - `openspec/changes/<change-name>/research/` — 技术调研（如果存在）

      信源规则：
      - #1（遗漏/溢出）：以 proposal.md 为范围锚点
      - #3（验收标准）：以 specs 为权威来源
      - #5（一致性）：不做自动裁决，发现矛盾时同时列出双方原文，由人类判定

      请按以下三组顺序逐一检查，组内按编号顺序执行，不得跳过。

      === A. 宏观一致性 ===
      1. 遗漏与溢出——proposal 中的要点未被 specs/design 覆盖？反之，specs/design 中是否有 proposal 未提及的内容？
      2. artifacts 一致性——specs 和 design 之间是否有矛盾？（发现矛盾时列出双方原文，不做自动裁决）
      3. research 完整性——proposal 中标记 [NEEDS INVESTIGATION] 的不确定点是否都有对应的 research/ 产出？结论是否在 design 中被引用？
      4. decision 理由——design 中的关键技术决策是否都有明确的选型理由？有无"选 X 但没说为什么"的情况？

      === B. 微观质量 ===
      5. 缺失的验收标准——每个 requirement 是否有明确的 WHEN/THEN 验收场景？
      6. 边界情况覆盖——错误路径、并发、权限、空输入、超大输入等是否被识别？（注：识别了但未写验收标准的归入 #5）
      7. 表达模糊——是否存在：(a) 同一概念在不同 artifact 中使用不同术语；(b) 使用了无量化指标的形容词且未定义度量方式；(c) 代词指代不明

      === C. 可执行性 ===
      8. scope creep——是否有 proposal 未提及的新增范围？（注：#1 检查"有没有覆盖"，本项检查"是否该做"）
      9. task 可衍生性——每个 requirement 是否涉及 ≤1 个独立代码变更？若涉及 ≥2 个不同文件/模块的变更，标记为需要拆分
      10. 依赖隐含——task 之间是否有未声明的先后依赖关系？

      严重程度判定锚点：
      🔴 阻塞：会导致 plan 生成错误或 task 无法执行（遗漏核心需求、验收标准缺失、artifacts 矛盾）
      🟡 警告：不阻塞但会降低 plan 质量（表达模糊、scope creep、边界情况未覆盖）
      ⚪ 建议：可改进但不影响执行（命名不一致、缺少注释）

      输出格式（严格遵守）：
      ### Findings
      [序号] 严重程度 检查项名称
          发现：具体描述
          建议：具体修改建议

      ### Summary
      🔴: N | 🟡: N | ⚪: N

      如果所有检查项均无发现，输出：### Summary\n✅ 全部通过，无发现"
      ```

      **收集评审结果：**
      1. 读取 Oracle 输出，列出所有 🔴/🟡/⚪ 发现
      2. 分类判定：
         - 有 🔴 或 🟡 → BLOCKED，AI 用 Read/Edit 工具直接修复 artifacts。只修复标记为 🔴/🟡 的问题，不要修改其他内容。修复完成后重新运行 PHASE 2（最多 3 轮）
         - 仅 ⚪ → 留到 PHASE 4 末尾统一展示给用户

      === PHASE 3：生成 OMO 计划 ===

      生成 `.omo/plans/<change-name>.md` — OMO 兼容的执行计划。

      由当前 AI 直接执行，**但先咨询 Metis**（Plan Consultant 角色），再写 plan。

      **执行流程**：

      1. **Plan Consultant 咨询**（先于 plan 生成）：
         - 调用 Metis agent 提供 plan 策略咨询
         - 输入：4 个 artifacts 内容（proposal/specs/design/research）
         - 输出：plan 应该包含哪些关键 task、Wave 划分建议、潜在风险与依赖、Acceptance Criteria 重点
         - **用法**：AI 拿到 Metis 建议后**融入**自己生成的 9 个 section 内容中（不机械照抄）

         ```
         METIS_PLAN_CONSULT_PROMPT = "你是一个 Plan Consultant，正在为一个 OpenSpec change 提供 plan 策略建议。
         你的输出会被 AI 用来生成 9-section OMO 计划。

         输入文件（请直接读取以下文件获取完整内容）：
         - `openspec/changes/<change-name>/proposal.md`
         - `openspec/changes/<change-name>/specs/`
         - `openspec/changes/<change-name>/design.md`
         - `openspec/changes/<change-name>/research/`（如果存在）

         请输出**简短、聚焦**的策略建议（不要写完整 plan，只给方向）：
         1. **关键 task 清单**：列出 3-8 个最关键的任务（含编号建议 N./FN.）
         2. **Wave 划分建议**：如何分组（按依赖/按能力/按并行度）
         3. **风险与依赖**：最值得关注的 2-3 个风险点
         4. **Acceptance Criteria 重点**：哪些场景必须覆盖

         严重程度：🔴 阻塞 / 🟡警告 / ⚪ 建议
         输出格式：按以上 4 个小节分点列出"
         ```

         task(subagent_type="metis", prompt=METIS_PLAN_CONSULT_PROMPT)

      2. 读取以下 4 个输入文件：
         - `openspec/changes/<change-name>/proposal.md` — 动机和能力
         - `openspec/changes/<change-name>/specs/` — 需求和验收场景
         - `openspec/changes/<change-name>/design.md` — 技术方案、决策、风险
         - `openspec/changes/<change-name>/research/` — 技术调研（如果存在）

      3. AI **直接**写 OMO 兼容 plan markdown 到 `.omo/plans/<change-name>.md`

      **OMO plan 格式规范**（必须严格遵守，check_plan 会校验）：

      ```markdown
      ## 1. TL;DR

      一句话概述本次变更做什么。

      ## 2. Context

      背景信息（2-3 句）。

      ## 3. Work Objectives

      - **Must Have**:
        - 目标 1
      - **Must NOT Have**:
        - 非目标 1

      ## 4. Verification Strategy

      - **Test Decision**: 单元测试 + E2E
      - **Coverage Target**: ≥ 80%

      ## 5. Execution Strategy

      - **Critical Path**: 步骤 A → 步骤 B → 步骤 C
      - **Max Concurrent**: 3

      ## 6. TODOs

      ### 6.1 Wave 1: 标题

      #### 1. [ ] 任务标题

      - **What to do**:
        1. 具体动作 1
        2. 具体动作 2
      - **Must NOT do**:
        - 不要做 X
      - **Recommended Agent Profile**: `category="quick"` 或 `deep` 等
      - **References**:
        - `path/to/file.ts` (行号 L100-120)
        - spec: `xxx/spec.md` "requirement 名"
      - **Acceptance Criteria**:
        ```bash
        test -f path/to/file.ts && grep -q "pattern" path/to/file.ts
        ```
      - **QA Scenarios**:
        - **Happy**: 正常路径
        - **Exception**: 异常路径
      - **Parallelization**: 可与 Task 2 并发
      - **Evidence**: `.omo/evidence/xxx.txt`
      - **Commit**: YES

      ## 7. Final Verification Wave

      ### F1. [ ] 验证项标题

      - **Acceptance Criteria**:
        - 检查 1
        - 检查 2

      ## 8. Commit Strategy

      - 每个 task 一个 commit
      - 使用 Conventional Commits 格式

      ## 9. Success Criteria

      - [ ] 硬性指标 1
      - [ ] 软性指标 1
      ```

      **关键约束**（check_plan 11 项检查的硬性要求）：
      - 9 个 section 标题必须存在（可用 `## 1. TL;DR` 或 `## TL;DR` 两种格式，**推荐编号**以匹配 OMO 项目惯例）
      - TODOs section 必须含至少 1 个 `#### N. [ ] <title>` 格式任务
      - Final Verification Wave section 必须含至少 1 个 `### FN. [ ] <title>` 格式任务
      - Wave 标题（如 `### 6.1 Wave 1: 标题`）用 3 个 `#` + 数字 sub-number + 中英文冒号 `:` 或 `：`

      **写 plan 时**：
      - 用 `write` 工具直接写文件到 `.omo/plans/<change-name>.md`
      - 不要手动 mkdir（write 工具会处理父目录）

      4. **通过 OpenCode tool 机制**调用 `omo_spec_check_plan`（参数：`change_name=<change-name>`，**不要走 bash**）做 11 项 OMO 兼容性检查
      - ✅ 通过（11/11）→ 进入 PHASE 4
      - ❌ 失败 → tool 会 throw 错误，按错误信息修复 plan 后重新验证（最多 3 轮）

      === PHASE 4：Oracle + Momus 并行审查 Plan + Verdict 处理 ===

      **4.1 plan 结构检查（OMO 兼容性）**：

      **通过 OpenCode tool 机制**调用 `omo_spec_check_plan`（参数：`change_name=<change-name>`，**不要走 bash**）做 11 项 OMO 兼容性检查（9 个 section + 2 个任务格式）。检查项详见 tool 自身描述。

      tool 返回 `✅ 全部通过` → 进入 PHASE 4.2 启动 Oracle+Momus 审查。
      tool 返回 `❌ 失败` → **AI 自动修复 plan**（按 tool 输出的失败项调整内容），修复后重新跑 PHASE 4.1 验证。
         - 最多 3 轮。3 轮后仍有失败 → 停止，提示用户手动修复。

      **4.2 启动 Oracle + Momus 并行审查**：

      ```
      PLAN_REVIEW_PROMPT = "你正在审查 OMO plan。请逐一检查以下所有检查项：

      审查文件：
      - plan: .omo/plans/<change-name>.md
      - `openspec/changes/<change-name>/proposal.md` — 动机和能力
      - `openspec/changes/<change-name>/specs/` — 需求和验收场景
      - `openspec/changes/<change-name>/design.md` — 技术方案、决策、风险
      - `openspec/changes/<change-name>/research/` — 技术调研（如果存在）

      1. OMO 兼容性——plan 是否使用 `## TODOs`（非 `## Tasks`）？任务格式是否为 `N. task`（非 `N.M task`）？
      2. Design 对齐——Execution Strategy 是否准确反映了 design 的技术决策和风险缓解措施？
      3. Verification 覆盖——Verification Strategy 是否覆盖了 all spec 的 scenarios？
      4. Success Criteria——是否可衡量？是否覆盖了所有 capability？
      5. research 引用——research/ 的调研发现是否在 plan 中被正确引用？
      6. 结构格式——是否使用 summary + link 模式？非 Task sections 是否引用了其他 artifacts？
      7. Tasks 质量——每个 task 是否包含 What to do / Must NOT do / Agent Profile / References / Acceptance Criteria / QA Scenarios / Parallelization / Evidence / Commit？内容是否有意义（非占位符）？
      8. QA Scenarios 质量——每个 QA Scenario 是否有五要素？是否至少覆盖 1 个成功场景 + 1 个异常场景？
      9. 可执行性——FVW 是否合理？执行策略是否可行？任务依赖真实？
      10. 潜在问题——是否有遗漏的边界场景？逻辑漏洞？矛盾？

      严重程度：🔴 阻塞 / 🟡 警告 / ⚪ 建议
      输出格式：逐项检查，然后汇总问题清单，每个问题标注 severity。"

      ORACLE_PLAN_REVIEW_PROMPT = PLAN_REVIEW_PROMPT

      MOMUS_PLAN_REVIEW_PROMPT = "你正在对 OMO plan 执行双重门禁审查（Momus 评审）。

      **Part A — 执行路径审查（可操作性）**：
      1. Wave 依赖是否合理？同一 Wave 内的 task 是否真的可以并发？
      2. 每个 task 的 Acceptance Criteria 是否可执行？（必须是具体的命令，如 `bun test`、`curl`）
      3. 有无明显的执行顺序错误？
      4. FVW 是否覆盖了关键验证点？
      5. 如果 research/ 存在：调研结论是否被 plan 正确引用？

      **Part B — 风险矩阵审查（遗漏覆盖）**：
      1. 是否有遗漏的边界场景（空值、错误路径、并发冲突、权限不足）？
      2. QA Scenarios 是否至少包含一个成功场景（happy path）+ 一个异常场景？
      3. Commit Strategy 是否合理？是否有多人协作的冲突风险？
      4. Success Criteria 是否真正可衡量？
      5. 如果 research/ 存在：是否有 research 发现未被 plan 覆盖？

      审查文件：
      - plan: .omo/plans/<change-name>.md

      最终判定：
      - ✅ OKAY → 无 blocking issues，plan 可执行
      - 🔴 REJECT → plan 不可执行，需要修复后重新评审

      输出格式：先按 Part A / Part B 分别分析，最后给出综合判定。所有发现使用 🔴/🟡/⚪ 标注严重程度。"

      task(subagent_type="oracle", prompt=ORACLE_PLAN_REVIEW_PROMPT)
      task(subagent_type="momus", prompt=MOMUS_PLAN_REVIEW_PROMPT)
      ```

      **4.3 收集评审结果**：
      1. 读取 Oracle 和 Momus 输出，合并发现（同一问题多个 agent 都发现时取更高严重程度）
      2. 分类判定：
         - 有 🔴 或 🟡 → BLOCKED，AI 用 Read/Edit 工具直接修复 plan。只修复标记为 🔴/🟡 的问题，不要修改其他内容。修复完成后重新运行 PHASE 4（**最多 3 轮**，超限后汇总给用户）
         - 仅 ⚪ → 进入 4.4 Verdict 处理

      **4.4 Verdict 处理**：

      收集所有未解决的 ⚪ 项（来自 PHASE 2 差距分析遗留 + PHASE 4 plan 审查遗留），向用户呈现并询问。

      === PHASE 5：同步 tasks.md 镜像 ===

      **仅在 PHASE 4 审查通过（用户选择 1）后执行**。

      **通过 OpenCode tool 机制**调用 `omo_spec_plan_to_tasks`（**batch 模式无参**，**不要走 bash**）将所有 plan 批量镜像到匹配的非归档 change 的 `tasks.md`。

      **本阶段 sync tool 只调这一次**——plan 没改就不要再调。plan 是 single source of truth,tasks.md 只是镜像(apply 阶段 Step 4 还有一次最终同步,见后)。如果 plan 后续需要修改,修完后重跑一次 sync tool 即可,中间不需要周期性同步。

      这会生成 OpenSpec 期望的 checkbox 格式（含 Plan Reference 附录，保留全部 9 章节内容）。


      调用成功后，tasks 阶段完成。
    requires:
      - specs
      - design
