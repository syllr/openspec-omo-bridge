      === PHASE 7：阻塞判定 ===

      - 如果返回的 critic.md 为 "ALL DONE" → **✅ PASS**，继续
      - 如果返回的 critic.md 包含未解决问题 → **⚠️ CONDITIONAL**，列出 🟡 项让用户确认是否接受风险
      - 用户确认后进入 apply 阶段
    requires:
      - tasks
      - proposal
      - design
      - specs
apply:
  requires:
    - critic
  tracks: tasks.md
  instruction: |
    __LANG_PLACEHOLDER__

    **重要：本指令覆盖 `/openspec-apply-change` 的执行逻辑。
    只能通过 `/start-work` 来执行计划。
    忽略任何要求从 tasks.md 逐一手动执行任务的指令
    仅遵循本指令的流程：verdict 检查 → `/start-work` → Oracle 验证 → 同步。**

     先读取 `openspec/changes/<change-name>/critic.md`，检查 VERDICT：

      1. 如果 critic.md 内容为 **ALL DONE**（✅ PASS）→ 继续
      2. 如果 critic.md 包含未解决问题的清单（⚠️ CONDITIONAL）→ 列出 🟡 项，要求用户确认后再继续
      3. 其他情况 → 停止，提示用户修复后重新运行 critic

     VERDICT 确认后，调用：
     ```
     /start-work .omo/plans/<change-name>.md
     ```

     这会调用 OMO 内置的计划执行器（Atlas），读取计划文件并执行任务，包含委托、验证和会话连续性。

     **处理 `/start-work` 的三种结果：**
     1. **ALL_DONE**（完成）：所有 task 执行完毕 → 继续 Oracle 验证
     2. **PAUSE**（暂停）：部分 task 完成，用户暂停 → 继续 Oracle 验证，告知用户后续可重新运行 /start-work 继续
     3. **FAILED**（失败）：/start-work 本身崩溃或 Atlas 不可用 → 立即停止，向用户报告：「🔴 /start-work 执行失败。[错误信息]」，等待用户介入

     成功（ALL_DONE 或 PAUSE）后，捕获变更文件列表：
    ```
    git diff --name-only HEAD
    ```
    这告诉 Oracle 哪些文件被此变更创建或修改。
    然后运行 Oracle 验证，最多 3 轮。

     如果 Oracle task() 调用失败（超时、不可用、出错），立即停止工作流（**fast fail，不得降级**）：
     - 向用户报告：「🔴 实现验证中断：Oracle 调用失败。[错误信息]」
     - 不得自行分析 git diff，不得自行生成 verify.md，不得自行判定
     - 等待用户介入

    ```
    task(subagent_type="oracle", run_in_background=false, prompt="你正在验证实现产出与 OpenSpec change artifacts 的一致性。
    请检查所有实现产出（代码、配置、文档等）是否按 proposal、spec、design 的要求正确实现。
    按严重程度输出发现（🔴阻塞 / 🟡警告 / ⚪建议）。

    审查文件：
    - `openspec/changes/<change-name>/proposal.md` — 动机和能力
    - `openspec/changes/<change-name>/specs/` — 需求和验收场景
    - `openspec/changes/<change-name>/design.md` — 技术方案、决策、风险
    - `openspec/changes/<change-name>/tasks.md` — checkbox 任务清单
    - `.omo/plans/<change-name>.md` — OMO 执行计划
    - `openspec/changes/<change-name>/research/` — 技术调研（如果存在）

    变更文件清单（来自 git diff --name-only HEAD）：
    [在此填入上个命令的输出]

    请逐一检查变更文件是否满足以下条件：

    维度 1 — Spec 合规性：
    - 每个 spec requirement 的 scenario 是否在实现中有对应体现？
    - 实现行为是否满足 spec 中 WHEN/THEN 的条件？

    维度 2 — Design 对齐（实现与 Design 一致性）：
    - 实现方案是否符合 design.md 的技术决策？
    - design 中明确排除的 Non-Goals 是否在实现中出现？
    - research/ 中的调研结论是否在实现中得到正确应用？

    维度 3 — Proposal 范围：
    - 实现内容是否在 proposal 定义的 Capabilities 范围内？
    - 是否有超出 proposal 范围的 scope leak？
    - proposal 中的所有 Capability 是否都有对应实现？

     维度 4 — Task 完成度：
     - tasks.md 中的所有 task 是否都有对应的实现产出？
     - plan 中每个 task 的 Evidence 路径是否存在？关键 task 的 evidence 内容是否与 Acceptance Criteria 匹配？

     维度 5 — 非功能性合规性（如果 design/proposal 中有相关要求）：
     - 性能要求（响应时间、吞吐量等）是否达标？
     - 安全相关决策（认证、授权、加密）是否在实现中正确应用？
     - 兼容性约束是否被遵守？

    输出格式：逐维度分析 + 问题汇总 + 总体结论。

    最终判定标准：
    - 🔴 BLOCKED：存在严重的实现偏离，必须修复才能继续
    - ⚠️ CONDITIONAL：实现基本正确但有 🟡/⚪ 瑕疵，可接受风险继续推进
     注意：请谨慎区分 BLOCKED 和 CONDITIONAL。只有确实阻碍功能正确性的问题才标 🔴。
     ")
    ```

      读取 Oracle 输出中的最终判定：
      1. 如果 ✅ PASS → 继续
      2. 如果 🔴 BLOCKED：
           将所有 🔴 问题打包，调用 agent 一次性修复：
           task(category="write", load_skills=[], run_in_background=false,
                prompt="根据以下验证结果修复实现产出。只修复标记为 🔴 的问题，不要修改其他内容。

                Oracle 验证结果中的所有 🔴 问题：
                [将 Oracle 输出的 🔴 问题列表及修复建议填入此处]")
           修复完成后重新运行 Oracle 验证（**最多 3 轮**，超限后汇总给用户）
      3. 如果 ⚠️ CONDITIONAL → 汇总 🟡/⚪ 展示给用户，让用户决定是否接受

    **同步协议**：
    - plan 文件的 `## Tasks` 部分跟踪 `/start-work` 的 checkbox 状态
    - `openspec/changes/<change-name>/tasks.md` 是 OpenSpec 的真实来源
    - `/start-work` 完成或暂停后，将 `.omo/plans/<change-name>.md` 的 checkbox 状态复制到
      `openspec/changes/<change-name>/tasks.md` 保持同步
    - 运行以下命令验证暂停/完成时的状态一致性：
      diff <(grep '^- \[' openspec/changes/<change-name>/tasks.md) <(sed -n '/^## Tasks/,/^## /p' .omo/plans/<change-name>.md | grep '^- \[')
